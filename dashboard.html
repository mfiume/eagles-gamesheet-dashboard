let statsSortCol = 'pts';
let statsSortDir = -1; // -1 = desc
const statsColumns = [
  { key: 'name', label: 'Player', sortable: true },
  { key: 'team', label: 'Team', sortable: true },
  { key: 'number', label: '#', sortable: true },
  { key: 'position', label: 'Pos', sortable: true },
  { key: 'gp', label: 'GP', sortable: true },
  { key: 'g', label: 'G', sortable: true },
  { key: 'a', label: 'A', sortable: true },
  { key: 'pts', label: 'PTS', sortable: true },
  { key: 'ppg', label: 'PPG', sortable: true },
  { key: 'pim', label: 'PIM', sortable: true },
];

function renderStatsTable(allStats, teamFilter, searchTerm) {
  let filtered = allStats;
  if (teamFilter === 'Non Eagles') {
    filtered = filtered.filter(p => p.team !== 'Toronto Eagles');
  } else if (teamFilter && teamFilter !== 'All Teams') {
    filtered = filtered.filter(p => p.team === teamFilter);
  }
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
  }

  // Filter out goalies from scoring stats? No, keep them — goalies can get assists
  // Add PPG
  filtered = filtered.map(p => ({ ...p, ppg: p.gp > 0 ? (p.pts / p.gp) : 0 }));

  // Sort
  filtered.sort((a, b) => {
    let va = a[statsSortCol], vb = b[statsSortCol];
    if (statsSortCol === 'name' || statsSortCol === 'team' || statsSortCol === 'position') {
      va = (va || '').toLowerCase();
      vb = (vb || '').toLowerCase();
      return statsSortDir * va.localeCompare(vb);
    }
    return statsSortDir * ((va || 0) - (vb || 0));
  });

  const ths = statsColumns.map(c => {
    const sorted = statsSortCol === c.key;
    const arrow = sorted ? (statsSortDir === -1 ? ' &#9660;' : ' &#9650;') : '';
    return `<th class="sortable ${sorted ? 'sorted' : ''}" data-col="${c.key}">${c.label}${arrow ? `<span class="sort-arrow">${arrow}</span>` : ''}</th>`;
  }).join('');

  const rows = filtered.map(p => {
    const isEagles = p.team === TEAM;
    return `<tr class="${isEagles ? 'eagles-row' : ''}">
      <td style="font-weight:600"><span class="player-link" data-player="${p.name}" data-team="${p.team}">${toTitleCase(p.name)}</span></td>
      <td>${p.team}${isEagles ? ' <span style="color:var(--accent);font-size:10px">&#9733;</span>' : ''}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${p.number || '-'}</td>
      <td>${p.position === 'G' ? '<span style="color:var(--accent)">G</span>' : ''}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${p.gp}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:600">${p.g}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${p.a}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent)">${p.pts}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${p.ppg.toFixed(2)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;${p.pim > 0 ? 'color:var(--yellow)' : ''}">${p.pim}</td>
    </tr>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-title">Player Statistics (${filtered.length} players)</div>
      <div class="table-wrap" style="max-height:600px;overflow-y:auto">
        <table>
          <thead><tr>${ths}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// Tab 5: Scouting Report
function renderScouting(games) {
  const allStats = buildPlayerStats(games);
  const eaglesGames = games.filter(g => g.homeTeam === TEAM || g.visitorTeam === TEAM);

  // Get opposing teams
  const opponents = new Set();
  eaglesGames.forEach(g => opponents.add(getOpponent(g)));
  const sortedOpponents = [...opponents].sort();

  let html = '<div class="tab-panel" id="tab-scouting"><div class="scouting-grid">';

  sortedOpponents.forEach(opp => {
    // Games vs this opponent
    const vsGames = eaglesGames.filter(g => getOpponent(g) === opp);
    let w = 0, l = 0, t = 0;
    vsGames.forEach(g => { const r = getResult(g); if (r === 'W') w++; else if (r === 'L') l++; else t++; });

    // Get opponent players
    const oppPlayers = allStats.filter(p => p.team === opp && p.position !== 'G');
    const oppGoalies = allStats.filter(p => p.team === opp && p.position === 'G');

    // Top scorers
    const topScorers = [...oppPlayers].sort((a, b) => b.pts - a.pts || b.g - a.g).slice(0, 5);

    // Hot players: multi-point games or scored in recent games
    const recentGames = vsGames.slice(-3);
    const recentScorers = new Set();
    recentGames.forEach(g => {
      const side = g.homeTeam === opp ? 'home' : 'visitor';
      g[side].scoring.forEach(s => {
        recentScorers.add(s.goalScorer);
        if (s.assist1) recentScorers.add(s.assist1);
        if (s.assist2) recentScorers.add(s.assist2);
      });
    });

    // Players with multi-point games
    const multiPointPlayers = oppPlayers.filter(p => {
      return Object.values(p.gameGoals).some(gCount => gCount >= 2);
    });

    const hotPlayers = oppPlayers.filter(p => recentScorers.has(p.name) || multiPointPlayers.includes(p));
    const uniqueHot = [...new Set(hotPlayers.map(p => p.name))].map(name => hotPlayers.find(p => p.name === name)).slice(0, 4);

    html += `
      <div class="scouting-card">
        <h3>${opp}</h3>
        <div class="record">Record vs Eagles: <span style="color:${w > l ? 'var(--red)' : w < l ? 'var(--green)' : 'var(--yellow)'}">${w}W-${l}L-${t}T</span> (${vsGames.length} GP)</div>

        <div class="threat-section-title">Goalies</div>
        <ul class="threat-list">
          ${oppGoalies.length ? oppGoalies.map(g => `
            <li>
              <span><span class="player-num">#${g.number}</span>${toTitleCase(g.name)}</span>
              <span class="stat-pill">${g.gp} GP</span>
            </li>
          `).join('') : '<li style="color:var(--text-dim)">No goalie data</li>'}
        </ul>

        <div class="threat-section-title">Top Scorers</div>
        <ul class="threat-list">
          ${topScorers.map(p => `
            <li>
              <span><span class="player-num">#${p.number}</span>${toTitleCase(p.name)}</span>
              <span class="stat-pill">${p.g}G ${p.a}A = ${p.pts}P</span>
            </li>
          `).join('')}
          ${topScorers.length === 0 ? '<li style="color:var(--text-dim)">No scoring data</li>' : ''}
        </ul>

        ${uniqueHot.length ? `
          <div class="threat-section-title">Hot / Multi-Point Players</div>
          <ul class="threat-list">
            ${uniqueHot.map(p => `
              <li>
                <span><span class="player-num">#${p.number}</span>${toTitleCase(p.name)}</span>
                <span class="stat-pill" style="background:var(--red-dim);color:var(--red)">${p.g}G ${p.a}A</span>
              </li>
            `).join('')}
          </ul>
        ` : ''}
      </div>
    `;
  });

  html += '</div></div>';
  return html;
}

// Tab 6: Advanced Analytics
function renderAnalytics(games) {
  const eaglesGames = games.filter(g => g.homeTeam === TEAM || g.visitorTeam === TEAM);

  // 1. Standings
  const teamStats = {};
  games.forEach(g => {
    [g.homeTeam, g.visitorTeam].forEach(t => {
      if (!teamStats[t]) teamStats[t] = { w: 0, l: 0, t: 0, gf: 0, ga: 0, pts: 0, gp: 0 };
    });
    const homeWin = g.homeScore > g.visitorScore;
    const tie = g.homeScore === g.visitorScore;
    teamStats[g.homeTeam].gp++;
    teamStats[g.visitorTeam].gp++;
    teamStats[g.homeTeam].gf += g.homeScore;
    teamStats[g.homeTeam].ga += g.visitorScore;
    teamStats[g.visitorTeam].gf += g.visitorScore;
    teamStats[g.visitorTeam].ga += g.homeScore;
    if (homeWin) {
      teamStats[g.homeTeam].w++;
      teamStats[g.homeTeam].pts += 2;
      teamStats[g.visitorTeam].l++;
    } else if (tie) {
      teamStats[g.homeTeam].t++;
      teamStats[g.homeTeam].pts += 1;
      teamStats[g.visitorTeam].t++;
      teamStats[g.visitorTeam].pts += 1;
    } else {
      teamStats[g.visitorTeam].w++;
      teamStats[g.visitorTeam].pts += 2;
      teamStats[g.homeTeam].l++;
    }
  });

  const standings = Object.entries(teamStats).map(([name, s]) => ({
    name, ...s, gd: s.gf - s.ga
  })).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

  let standingsRows = standings.map((t, i) => {
    const isEagles = t.name === TEAM;
    return `<tr class="${isEagles ? 'eagles-row' : ''}">
      <td style="font-family:'IBM Plex Mono',monospace">${i + 1}</td>
      <td style="font-weight:600">${t.name}${isEagles ? ' <span style="color:var(--accent);font-size:10px">&#9733;</span>' : ''}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${t.gp}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--green)">${t.w}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--red)">${t.l}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:var(--yellow)">${t.t}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent)">${t.pts}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${t.gf}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${t.ga}</td>
      <td style="font-family:'IBM Plex Mono',monospace;color:${t.gd > 0 ? 'var(--green)' : t.gd < 0 ? 'var(--red)' : 'var(--text-dim)'}">${t.gd > 0 ? '+' : ''}${t.gd}</td>
    </tr>`;
  }).join('');

  // 2. Penalty analysis (Eagles)
  const penaltyCounts = {};
  const penaltyPlayers = {};
  eaglesGames.forEach(g => {
    const side = getEaglesSide(g);
    g[side].penalties.forEach(p => {
      penaltyCounts[p.code] = (penaltyCounts[p.code] || 0) + 1;
      const key = p.player;
      if (!penaltyPlayers[key]) penaltyPlayers[key] = { name: p.name || p.player, pim: 0, count: 0, number: p.number };
      penaltyPlayers[key].pim += (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0);
      penaltyPlayers[key].count++;
    });
  });

  const topPenCodes = Object.entries(penaltyCounts).sort((a, b) => b[1] - a[1]);
  const maxPenCode = topPenCodes.length ? topPenCodes[0][1] : 1;
  const penCodeBars = topPenCodes.map(([code, count]) => {
    const pct = (count / maxPenCode) * 100;
    const name = PENALTY_NAMES[code] || code;
    return `<div class="bar-row">
      <span class="bar-label">${code}</span>
      <div class="bar-track">
        <div class="bar-fill yellow" style="width:${pct}%"></div><span class="bar-text-outside">${count}x ${name}</span>
      </div>
    </div>`;
  }).join('');

  const topPenPlayers = Object.values(penaltyPlayers).sort((a, b) => b.pim - a.pim).slice(0, 10);
  const maxPIM = topPenPlayers.length ? topPenPlayers[0].pim : 1;
  const penPlayerBars = topPenPlayers.map(p => {
    const pct = (p.pim / maxPIM) * 100;
    return `<div class="bar-row">
      <span class="bar-label">#${p.number}</span>
      <div class="bar-track">
        <div class="bar-fill red" style="width:${pct}%"></div><span class="bar-text-outside">${p.pim} PIM — ${toTitleCase(p.name)}</span>
      </div>
    </div>`;
  }).join('');

  // 3. Scoring by period (Eagles)
  const periodGF = { 1: 0, 2: 0, 3: 0 };
  const periodGA = { 1: 0, 2: 0, 3: 0 };
  eaglesGames.forEach(g => {
    const ourSide = getEaglesSide(g);
    const theirSide = ourSide === 'home' ? 'visitor' : 'home';
    g[ourSide].scoring.forEach(s => { periodGF[s.period] = (periodGF[s.period] || 0) + 1; });
    g[theirSide].scoring.forEach(s => { periodGA[s.period] = (periodGA[s.period] || 0) + 1; });
  });
  const maxPeriodGoals = Math.max(...Object.values(periodGF), ...Object.values(periodGA), 1);

  const periods = [1, 2, 3];
  const periodBars = periods.map(p => {
    const gfH = (periodGF[p] / maxPeriodGoals) * 200;
    const gaH = (periodGA[p] / maxPeriodGoals) * 200;
    return `<div class="period-bar-group">
      <div class="period-bar-pair">
        <div class="period-bar gf" style="height:${gfH}px"><span class="bar-val">${periodGF[p]}</span></div>
        <div class="period-bar ga" style="height:${gaH}px"><span class="bar-val">${periodGA[p]}</span></div>
      </div>
      <span class="period-bar-label">P${p}</span>
    </div>`;
  }).join('');

  // 4. Head-to-head records
  const opponents = new Set();
  eaglesGames.forEach(g => opponents.add(getOpponent(g)));
  let h2hCards = '';
  [...opponents].sort().forEach(opp => {
    const vsGames = eaglesGames.filter(g => getOpponent(g) === opp);
    let w = 0, l = 0, t = 0, gf = 0, ga = 0;
    vsGames.forEach(g => {
      const r = getResult(g);
      if (r === 'W') w++; else if (r === 'L') l++; else t++;
      const side = getEaglesSide(g);
      gf += side === 'home' ? g.homeScore : g.visitorScore;
      ga += side === 'home' ? g.visitorScore : g.homeScore;
    });
    h2hCards += `
      <div class="h2h-card">
        <div class="opponent">${opp}</div>
        <div class="h2h-record">
          <span class="w">${w}W</span>
          <span class="l">${l}L</span>
          <span class="t">${t}T</span>
          <span style="color:var(--text-dim)">(${vsGames.length} GP)</span>
        </div>
        <div class="h2h-goals">GF: ${gf} | GA: ${ga} | Diff: ${gf - ga > 0 ? '+' : ''}${gf - ga}</div>
      </div>
    `;
  });

  // 5. League-wide penalty leaders
  const allStats = buildPlayerStats(games);
  const leaguePenLeaders = allStats.filter(p => p.pim > 0).sort((a, b) => b.pim - a.pim).slice(0, 10);
  const maxLeaguePIM = leaguePenLeaders.length ? leaguePenLeaders[0].pim : 1;
  const leaguePenBars = leaguePenLeaders.map(p => {
    const pct = (p.pim / maxLeaguePIM) * 100;
    const isEagles = p.team === TEAM;
    return `<div class="bar-row">
      <span class="bar-label" style="${isEagles ? 'color:var(--accent)' : ''}">#${p.number}</span>
      <div class="bar-track">
        <div class="bar-fill ${isEagles ? 'accent' : 'red'}" style="width:${pct}%"></div><span class="bar-text-outside">${p.pim} PIM — ${toTitleCase(p.name)} (${p.team})</span>
      </div>
    </div>`;
  }).join('');

  // 6. Roster size distribution (Eagles skaters per game)
  const skaterCounts = [];
  eaglesGames.forEach(g => {
    const side = getEaglesSide(g);
    const activeSkaters = g[side].roster.filter(p => p.status === 'active' && p.position !== 'G').length;
    const result = getResult(g);
    skaterCounts.push({ date: g.isoDate, opponent: getOpponent(g), count: activeSkaters, gameType: g.gameType, result });
  });
  skaterCounts.sort((a, b) => a.date.localeCompare(b.date));
  const avgSkaters = skaterCounts.length > 0 ? (skaterCounts.reduce((s, g) => s + g.count, 0) / skaterCounts.length).toFixed(1) : 0;
  const minSkaters = skaterCounts.length > 0 ? Math.min(...skaterCounts.map(g => g.count)) : 0;
  const maxSkaters = skaterCounts.length > 0 ? Math.max(...skaterCounts.map(g => g.count)) : 0;
  const medianSkaters = skaterCounts.length > 0 ? [...skaterCounts].sort((a, b) => a.count - b.count)[Math.floor(skaterCounts.length / 2)].count : 0;

  // Distribution histogram
  const skaterDist = {};
  skaterCounts.forEach(g => { skaterDist[g.count] = (skaterDist[g.count] || 0) + 1; });
  const maxDistCount = Math.max(...Object.values(skaterDist), 1);
  const skaterDistBars = Object.entries(skaterDist)
    .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
    .map(([count, freq]) => {
      const pct = (freq / maxDistCount) * 100;
      const color = parseInt(count) >= 11 ? 'green' : parseInt(count) >= 9 ? 'accent' : 'yellow';
      return `<div class="bar-row">
        <span class="bar-label">${count}</span>
        <div class="bar-track">
          <div class="bar-fill ${color}" style="width:${pct}%"></div><span class="bar-text-outside">${freq} game${freq !== 1 ? 's' : ''}</span>
        </div>
      </div>`;
    }).join('');

  // Game-by-game line for skater count trend
  const rosterChartW = Math.max(skaterCounts.length * 20, 400);
  const rosterChartH = 140;
  const rosterPad = 30;
  const rosterMinY = Math.max(minSkaters - 1, 0);
  const rosterMaxY = maxSkaters + 1;
  const rosterXStep = skaterCounts.length > 1 ? (rosterChartW - rosterPad * 2) / (skaterCounts.length - 1) : 0;
  function rosterYPos(v) { return rosterChartH - rosterPad - ((v - rosterMinY) / (rosterMaxY - rosterMinY)) * (rosterChartH - rosterPad * 2); }

  let rosterPath = 'M';
  skaterCounts.forEach((g, i) => { rosterPath += (i ? 'L' : '') + (rosterPad + i * rosterXStep) + ',' + rosterYPos(g.count); });
  const rosterDots = skaterCounts.map((g, i) => {
    const x = rosterPad + i * rosterXStep;
    const y = rosterYPos(g.count);
    const color = g.result === 'W' ? 'var(--green)' : g.result === 'L' ? 'var(--red)' : 'var(--yellow)';
    return `<circle cx="${x}" cy="${y}" r="4" fill="${color}" style="cursor:help"><title>${g.date} vs ${g.opponent}\n${g.count} skaters — ${g.result}</title></circle>`;
  }).join('');

  // Y grid lines
  let rosterYLabels = '';
  for (let v = rosterMinY; v <= rosterMaxY; v++) {
    const y = rosterYPos(v);
    rosterYLabels += `<text x="${rosterPad - 6}" y="${y + 3}" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="end" font-family="IBM Plex Mono,monospace">${v}</text>`;
    rosterYLabels += `<line x1="${rosterPad}" y1="${y}" x2="${rosterChartW - rosterPad}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }
  // X labels
  let rosterXLabels = '';
  const rosterXStep2 = Math.max(1, Math.floor(skaterCounts.length / 10));
  skaterCounts.forEach((g, i) => {
    if (i % rosterXStep2 === 0 || i === skaterCounts.length - 1) {
      rosterXLabels += `<text x="${rosterPad + i * rosterXStep}" y="${rosterChartH - 8}" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle" font-family="IBM Plex Mono,monospace">${i + 1}</text>`;
    }
  });

  // Correlation: skater count vs result + GF/GA + per-period
  const countResults = {};
  eaglesGames.forEach((g, i) => {
    const c = skaterCounts[i].count;
    if (!countResults[c]) countResults[c] = { w: 0, l: 0, t: 0, total: 0, gf: 0, ga: 0, gfP: {1:0,2:0,3:0}, gaP: {1:0,2:0,3:0} };
    countResults[c].total++;
    const r = getResult(g);
    if (r === 'W') countResults[c].w++;
    else if (r === 'L') countResults[c].l++;
    else countResults[c].t++;
    const ourSide = getEaglesSide(g);
    const theirSide = ourSide === 'home' ? 'visitor' : 'home';
    countResults[c].gf += ourSide === 'home' ? g.homeScore : g.visitorScore;
    countResults[c].ga += ourSide === 'home' ? g.visitorScore : g.homeScore;
    g[ourSide].scoring.forEach(s => { if (countResults[c].gfP[s.period] !== undefined) countResults[c].gfP[s.period]++; });
    g[theirSide].scoring.forEach(s => { if (countResults[c].gaP[s.period] !== undefined) countResults[c].gaP[s.period]++; });
  });
  const countResultRows = Object.entries(countResults)
    .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
    .map(([count, s]) => {
      const winPct = s.total > 0 ? ((s.w + s.t * 0.5) / s.total * 100).toFixed(0) : '-';
      const gfPG = (s.gf / s.total).toFixed(1);
      const gaPG = (s.ga / s.total).toFixed(1);
      const diff = (s.gf / s.total - s.ga / s.total).toFixed(1);
      const diffColor = parseFloat(diff) > 0 ? 'color:var(--green)' : parseFloat(diff) < 0 ? 'color:var(--red)' : '';
      return `<tr>
        <td class="center mono">${count}</td>
        <td class="center mono">${s.total}</td>
        <td class="center mono" style="color:var(--green)">${s.w}</td>
        <td class="center mono" style="color:var(--red)">${s.l}</td>
        <td class="center mono" style="color:var(--yellow)">${s.t}</td>
        <td class="center mono" style="font-weight:700">${winPct}%</td>
        <td class="center mono">${gfPG}</td>
        <td class="center mono">${gaPG}</td>
        <td class="center mono" style="${diffColor};font-weight:700">${parseFloat(diff) > 0 ? '+' : ''}${diff}</td>
      </tr>`;
    }).join('');

  // Per-period GF/GA by roster size (stamina analysis)
  const sortedCounts = Object.entries(countResults).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
  const staminaRows = sortedCounts.map(([count, s]) => {
    const p1Diff = s.gfP[1] - s.gaP[1];
    const p2Diff = s.gfP[2] - s.gaP[2];
    const p3Diff = s.gfP[3] - s.gaP[3];
    const diffStyle = v => v > 0 ? 'color:var(--green)' : v < 0 ? 'color:var(--red)' : '';
    const fmt = v => (v > 0 ? '+' : '') + v;
    return `<tr>
      <td class="center mono">${count}</td>
      <td class="center mono">${s.total}</td>
      <td class="center mono">${s.gfP[1]}</td>
      <td class="center mono">${s.gaP[1]}</td>
      <td class="center mono" style="${diffStyle(p1Diff)};font-weight:700">${fmt(p1Diff)}</td>
      <td class="center mono">${s.gfP[2]}</td>
      <td class="center mono">${s.gaP[2]}</td>
      <td class="center mono" style="${diffStyle(p2Diff)};font-weight:700">${fmt(p2Diff)}</td>
      <td class="center mono">${s.gfP[3]}</td>
      <td class="center mono">${s.gaP[3]}</td>
      <td class="center mono" style="${diffStyle(p3Diff)};font-weight:700">${fmt(p3Diff)}</td>
    </tr>`;
  }).join('');

  // 7. Lead/Trail analysis — reconstruct score timeline for each Eagles game
  const leadTrailStats = {
    scoreFirst: { w: 0, l: 0, t: 0 },
    concFirst: { w: 0, l: 0, t: 0 },
    leadP1: { w: 0, l: 0, t: 0 },
    trailP1: { w: 0, l: 0, t: 0 },
    tiedP1: { w: 0, l: 0, t: 0 },
    leadP2: { w: 0, l: 0, t: 0 },
    trailP2: { w: 0, l: 0, t: 0 },
    tiedP2: { w: 0, l: 0, t: 0 },
    goalsWhenLeading: 0, goalsAgainstWhenLeading: 0,
    goalsWhenTrailing: 0, goalsAgainstWhenTrailing: 0,
    goalsWhenTied: 0, goalsAgainstWhenTied: 0,
    leadsBlown: [], comebacks: [], biggestLead: 0, biggestDeficit: 0,
    p3LeadIn: { gf: 0, ga: 0 }, p3TrailIn: { gf: 0, ga: 0 }, p3TiedIn: { gf: 0, ga: 0 }
  };
  const lt = leadTrailStats;

  eaglesGames.forEach(g => {
    const ourSide = getEaglesSide(g);
    const theirSide = ourSide === 'home' ? 'visitor' : 'home';
    const result = getResult(g);
    const opp = getOpponent(g);

    // Merge all goals into timeline
    const timeline = [];
    g[ourSide].scoring.forEach(s => timeline.push({ period: s.period, time: s.time, team: 'us' }));
    g[theirSide].scoring.forEach(s => timeline.push({ period: s.period, time: s.time, team: 'them' }));
    timeline.sort((a, b) => {
      if (a.period !== b.period) return a.period - b.period;
      // Higher time = earlier in period (counts down)
      return parseFloat(b.time) - parseFloat(a.time);
    });

    // Walk through timeline tracking score state
    let usScore = 0, themScore = 0;
    let maxLead = 0, maxDeficit = 0;
    let hadLead = false, leadLost = false;
    let hadDeficit = false, cameBack = false;
    let scoreAfterP1 = null, scoreAfterP2 = null;

    // Track goals by game state
    timeline.forEach(ev => {
      const state = usScore > themScore ? 'leading' : usScore < themScore ? 'trailing' : 'tied';
      if (ev.team === 'us') {
        usScore++;
        if (state === 'leading') lt.goalsWhenLeading++;
        else if (state === 'trailing') lt.goalsWhenTrailing++;
        else lt.goalsWhenTied++;
      } else {
        themScore++;
        if (state === 'leading') lt.goalsAgainstWhenLeading++;
        else if (state === 'trailing') lt.goalsAgainstWhenTrailing++;
        else lt.goalsAgainstWhenTied++;
      }
      const diff = usScore - themScore;
      if (diff > maxLead) maxLead = diff;
      if (diff < -maxDeficit) maxDeficit = -diff;
      if (diff > 0) hadLead = true;
      if (diff < 0) hadDeficit = true;
    });

    // Score after each period
    let us1 = 0, them1 = 0, us2 = 0, them2 = 0;
    timeline.forEach(ev => {
      if (ev.period <= 1) { if (ev.team === 'us') us1++; else them1++; }
      if (ev.period <= 2) { if (ev.team === 'us') us2++; else them2++; }
    });
    scoreAfterP1 = { us: us1, them: them1 };
    scoreAfterP2 = { us: us2, them: them2 };

    // First goal
    if (timeline.length > 0) {
      const first = timeline[0].team;
      const bucket = first === 'us' ? lt.scoreFirst : lt.concFirst;
      if (result === 'W') bucket.w++; else if (result === 'L') bucket.l++; else bucket.t++;
    }

    // After P1
    if (scoreAfterP1.us > scoreAfterP1.them) {
      if (result === 'W') lt.leadP1.w++; else if (result === 'L') lt.leadP1.l++; else lt.leadP1.t++;
    } else if (scoreAfterP1.us < scoreAfterP1.them) {
      if (result === 'W') lt.trailP1.w++; else if (result === 'L') lt.trailP1.l++; else lt.trailP1.t++;
    } else {
      if (result === 'W') lt.tiedP1.w++; else if (result === 'L') lt.tiedP1.l++; else lt.tiedP1.t++;
    }

    // After P2
    if (scoreAfterP2.us > scoreAfterP2.them) {
      if (result === 'W') lt.leadP2.w++; else if (result === 'L') lt.leadP2.l++; else lt.leadP2.t++;
    } else if (scoreAfterP2.us < scoreAfterP2.them) {
      if (result === 'W') lt.trailP2.w++; else if (result === 'L') lt.trailP2.l++; else lt.trailP2.t++;
    } else {
      if (result === 'W') lt.tiedP2.w++; else if (result === 'L') lt.tiedP2.l++; else lt.tiedP2.t++;
    }

    // P3 scoring based on entering state
    const p3GF = g[ourSide].scoring.filter(s => s.period === 3).length;
    const p3GA = g[theirSide].scoring.filter(s => s.period === 3).length;
    if (scoreAfterP2.us > scoreAfterP2.them) { lt.p3LeadIn.gf += p3GF; lt.p3LeadIn.ga += p3GA; }
    else if (scoreAfterP2.us < scoreAfterP2.them) { lt.p3TrailIn.gf += p3GF; lt.p3TrailIn.ga += p3GA; }
    else { lt.p3TiedIn.gf += p3GF; lt.p3TiedIn.ga += p3GA; }

    // Leads blown: had a lead but lost
    if (hadLead && result === 'L') {
      lt.leadsBlown.push({ date: g.isoDate, opp, maxLead, final: `${usScore}-${themScore}` });
    }
    // Comebacks: trailed but won
    if (hadDeficit && result === 'W') {
      lt.comebacks.push({ date: g.isoDate, opp, maxDeficit, final: `${usScore}-${themScore}` });
    }
    if (maxLead > lt.biggestLead) lt.biggestLead = maxLead;
    if (maxDeficit > lt.biggestDeficit) lt.biggestDeficit = maxDeficit;
  });

  function ltRecord(s) {
    const gp = s.w + s.l + s.t;
    if (gp === 0) return '<span style="color:var(--text-dim)">—</span>';
    const pct = ((s.w + s.t * 0.5) / gp * 100).toFixed(0);
    return `<span style="color:var(--green)">${s.w}W</span> <span style="color:var(--red)">${s.l}L</span> <span style="color:var(--yellow)">${s.t}T</span> <span style="font-weight:700">(${pct}%)</span>`;
  }
  function ltGP(s) { return s.w + s.l + s.t; }

  const blownRows = lt.leadsBlown.sort((a,b) => b.maxLead - a.maxLead).map(g =>
    `<tr><td>${g.date}</td><td>${g.opp}</td><td class="center mono">${g.maxLead}</td><td class="center mono" style="color:var(--red)">${g.final}</td></tr>`
  ).join('');
  const comebackRows = lt.comebacks.sort((a,b) => b.maxDeficit - a.maxDeficit).map(g =>
    `<tr><td>${g.date}</td><td>${g.opp}</td><td class="center mono">${g.maxDeficit}</td><td class="center mono" style="color:var(--green)">${g.final}</td></tr>`
  ).join('');

  // Goals by game state
  const totalGSLeading = lt.goalsWhenLeading + lt.goalsAgainstWhenLeading;
  const totalGSTrailing = lt.goalsWhenTrailing + lt.goalsAgainstWhenTrailing;
  const totalGSTied = lt.goalsWhenTied + lt.goalsAgainstWhenTied;

  return `
    <div class="tab-panel" id="tab-analytics">
      <div class="analytics-grid">
        <div class="card full-width">
          <div class="card-title">League Standings</div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>#</th><th>Team</th><th>GP</th><th>W</th><th>L</th><th>T</th><th>PTS</th><th>GF</th><th>GA</th><th>GD</th>
              </tr></thead>
              <tbody>${standingsRows}</tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Eagles Scoring by Period</div>
          <div class="period-breakdown">${periodBars}</div>
          <div class="legend">
            <div class="legend-item"><span class="legend-dot gf"></span> Goals For</div>
            <div class="legend-item"><span class="legend-dot ga"></span> Goals Against</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Eagles Penalty Breakdown</div>
          <div class="bar-chart">${penCodeBars || '<div class="no-data">No penalties</div>'}</div>
        </div>

        <div class="card">
          <div class="card-title">Eagles Most Penalized Players</div>
          <div class="bar-chart">${penPlayerBars || '<div class="no-data">No penalties</div>'}</div>
        </div>

        <div class="card">
          <div class="card-title">League Penalty Leaders</div>
          <div class="bar-chart">${leaguePenBars || '<div class="no-data">No penalties</div>'}</div>
        </div>

        <div class="card full-width">
          <div class="card-title">Eagles Roster Size Analysis</div>
          <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
            <div class="mini-stat"><div class="mini-val">${avgSkaters}</div><div class="mini-label">Avg Skaters</div></div>
            <div class="mini-stat"><div class="mini-val">${medianSkaters}</div><div class="mini-label">Median</div></div>
            <div class="mini-stat"><div class="mini-val">${minSkaters}</div><div class="mini-label">Minimum</div></div>
            <div class="mini-stat"><div class="mini-val">${maxSkaters}</div><div class="mini-label">Maximum</div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Skaters Dressed per Game (distribution)</div>
              <div class="bar-chart">${skaterDistBars}</div>
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Results &amp; Scoring by Roster Size</div>
              <table>
                <thead><tr><th class="center">Skaters</th><th class="center">GP</th><th class="center">W</th><th class="center">L</th><th class="center">T</th><th class="center">Win %</th><th class="center">GFA</th><th class="center">GAA</th><th class="center">Diff</th></tr></thead>
                <tbody>${countResultRows}</tbody>
              </table>
            </div>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Skaters per Game (over season)</div>
          <div style="overflow-x:auto">
            <svg width="${rosterChartW}" height="${rosterChartH}" style="display:block">
              ${rosterYLabels}${rosterXLabels}
              <path d="${rosterPath}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
              ${rosterDots}
              <line x1="${rosterPad}" y1="${rosterYPos(parseFloat(avgSkaters))}" x2="${rosterChartW - rosterPad}" y2="${rosterYPos(parseFloat(avgSkaters))}" stroke="var(--text-dim)" stroke-width="1" stroke-dasharray="4,4"/>
              <text x="${rosterChartW - rosterPad + 4}" y="${rosterYPos(parseFloat(avgSkaters)) + 3}" fill="var(--text-dim)" font-size="9" font-family="IBM Plex Mono,monospace">avg ${avgSkaters}</text>
            </svg>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">Game number on x-axis. Dot color: <span style="color:var(--green)">Win</span>, <span style="color:var(--red)">Loss</span>, <span style="color:var(--yellow)">Tie</span>. Dashed line = season average.</div>
          <div style="margin-top:20px;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Stamina Check: Goal Differential by Period &amp; Roster Size</div>
          <div style="overflow-x:auto">
            <table>
              <thead>
                <tr>
                  <th class="center" rowspan="2">Skaters</th>
                  <th class="center" rowspan="2">GP</th>
                  <th class="center" colspan="3" style="border-bottom:1px solid var(--border)">Period 1</th>
                  <th class="center" colspan="3" style="border-bottom:1px solid var(--border)">Period 2</th>
                  <th class="center" colspan="3" style="border-bottom:1px solid var(--border)">Period 3</th>
                </tr>
                <tr>
                  <th class="center" style="font-size:10px">GF</th><th class="center" style="font-size:10px">GA</th><th class="center" style="font-size:10px">+/-</th>
                  <th class="center" style="font-size:10px">GF</th><th class="center" style="font-size:10px">GA</th><th class="center" style="font-size:10px">+/-</th>
                  <th class="center" style="font-size:10px">GF</th><th class="center" style="font-size:10px">GA</th><th class="center" style="font-size:10px">+/-</th>
                </tr>
              </thead>
              <tbody>${staminaRows}</tbody>
            </table>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">If a shorter bench causes fatigue, expect goal differential to worsen in P3 compared to P1 for smaller roster sizes.</div>
        </div>

        <div class="card full-width">
          <div class="card-title">Eagles Lead &amp; Trail Analysis</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Record by Game Situation</div>
              <table>
                <thead><tr><th>Situation</th><th class="center">GP</th><th class="center">Record</th></tr></thead>
                <tbody>
                  <tr><td>Score first</td><td class="center mono">${ltGP(lt.scoreFirst)}</td><td class="center">${ltRecord(lt.scoreFirst)}</td></tr>
                  <tr><td>Concede first</td><td class="center mono">${ltGP(lt.concFirst)}</td><td class="center">${ltRecord(lt.concFirst)}</td></tr>
                  <tr style="border-top:1px solid var(--border)"><td>Leading after P1</td><td class="center mono">${ltGP(lt.leadP1)}</td><td class="center">${ltRecord(lt.leadP1)}</td></tr>
                  <tr><td>Trailing after P1</td><td class="center mono">${ltGP(lt.trailP1)}</td><td class="center">${ltRecord(lt.trailP1)}</td></tr>
                  <tr><td>Tied after P1</td><td class="center mono">${ltGP(lt.tiedP1)}</td><td class="center">${ltRecord(lt.tiedP1)}</td></tr>
                  <tr style="border-top:1px solid var(--border)"><td>Leading after P2</td><td class="center mono">${ltGP(lt.leadP2)}</td><td class="center">${ltRecord(lt.leadP2)}</td></tr>
                  <tr><td>Trailing after P2</td><td class="center mono">${ltGP(lt.trailP2)}</td><td class="center">${ltRecord(lt.trailP2)}</td></tr>
                  <tr><td>Tied after P2</td><td class="center mono">${ltGP(lt.tiedP2)}</td><td class="center">${ltRecord(lt.tiedP2)}</td></tr>
                </tbody>
              </table>
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Goals Scored by Game State</div>
              <table>
                <thead><tr><th>State</th><th class="center">GF</th><th class="center">GA</th><th class="center">+/-</th></tr></thead>
                <tbody>
                  <tr><td>When leading</td><td class="center mono">${lt.goalsWhenLeading}</td><td class="center mono">${lt.goalsAgainstWhenLeading}</td><td class="center mono" style="${lt.goalsWhenLeading - lt.goalsAgainstWhenLeading >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.goalsWhenLeading - lt.goalsAgainstWhenLeading >= 0 ? '+' : ''}${lt.goalsWhenLeading - lt.goalsAgainstWhenLeading}</td></tr>
                  <tr><td>When trailing</td><td class="center mono">${lt.goalsWhenTrailing}</td><td class="center mono">${lt.goalsAgainstWhenTrailing}</td><td class="center mono" style="${lt.goalsWhenTrailing - lt.goalsAgainstWhenTrailing >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.goalsWhenTrailing - lt.goalsAgainstWhenTrailing >= 0 ? '+' : ''}${lt.goalsWhenTrailing - lt.goalsAgainstWhenTrailing}</td></tr>
                  <tr><td>When tied</td><td class="center mono">${lt.goalsWhenTied}</td><td class="center mono">${lt.goalsAgainstWhenTied}</td><td class="center mono" style="${lt.goalsWhenTied - lt.goalsAgainstWhenTied >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.goalsWhenTied - lt.goalsAgainstWhenTied >= 0 ? '+' : ''}${lt.goalsWhenTied - lt.goalsAgainstWhenTied}</td></tr>
                </tbody>
              </table>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin:16px 0 8px">P3 Scoring by Entering State</div>
              <table>
                <thead><tr><th>Entering P3</th><th class="center">GF</th><th class="center">GA</th><th class="center">+/-</th></tr></thead>
                <tbody>
                  <tr><td>With lead</td><td class="center mono">${lt.p3LeadIn.gf}</td><td class="center mono">${lt.p3LeadIn.ga}</td><td class="center mono" style="${lt.p3LeadIn.gf - lt.p3LeadIn.ga >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.p3LeadIn.gf - lt.p3LeadIn.ga >= 0 ? '+' : ''}${lt.p3LeadIn.gf - lt.p3LeadIn.ga}</td></tr>
                  <tr><td>Trailing</td><td class="center mono">${lt.p3TrailIn.gf}</td><td class="center mono">${lt.p3TrailIn.ga}</td><td class="center mono" style="${lt.p3TrailIn.gf - lt.p3TrailIn.ga >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.p3TrailIn.gf - lt.p3TrailIn.ga >= 0 ? '+' : ''}${lt.p3TrailIn.gf - lt.p3TrailIn.ga}</td></tr>
                  <tr><td>Tied</td><td class="center mono">${lt.p3TiedIn.gf}</td><td class="center mono">${lt.p3TiedIn.ga}</td><td class="center mono" style="${lt.p3TiedIn.gf - lt.p3TiedIn.ga >= 0 ? 'color:var(--green)' : 'color:var(--red)'};font-weight:700">${lt.p3TiedIn.gf - lt.p3TiedIn.ga >= 0 ? '+' : ''}${lt.p3TiedIn.gf - lt.p3TiedIn.ga}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Leads Blown (${lt.leadsBlown.length} games)</div>
              ${lt.leadsBlown.length > 0 ? `<div class="table-wrap" style="max-height:200px;overflow-y:auto"><table>
                <thead><tr><th>Date</th><th>Opponent</th><th class="center">Lead</th><th class="center">Final</th></tr></thead>
                <tbody>${blownRows}</tbody>
              </table></div>` : '<div style="color:var(--text-dim);font-size:13px">No leads blown this season</div>'}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px">Comeback Wins (${lt.comebacks.length} games)</div>
              ${lt.comebacks.length > 0 ? `<div class="table-wrap" style="max-height:200px;overflow-y:auto"><table>
                <thead><tr><th>Date</th><th>Opponent</th><th class="center">Deficit</th><th class="center">Final</th></tr></thead>
                <tbody>${comebackRows}</tbody>
              </table></div>` : '<div style="color:var(--text-dim);font-size:13px">No comeback wins this season</div>'}
            </div>
          </div>
        </div>

        <div class="card full-width">
          <div class="card-title">Head-to-Head Records</div>
          <div class="h2h-grid">${h2hCards}</div>
        </div>
      </div>
    </div>
  `;
}

// Tab 7: Highlights
function renderHighlights(games) {
  const eaglesGames = games.filter(g => g.homeTeam === TEAM || g.visitorTeam === TEAM);

  function toTC(s) { return s.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' '); }
  function opponent(g) { return g.homeTeam === TEAM ? g.visitorTeam : g.homeTeam; }
  function eaglesSide(g) { return g.homeTeam === TEAM ? 'home' : 'visitor'; }
  function eaglesScore(g) { const s = eaglesSide(g); return s === 'home' ? g.homeScore : g.visitorScore; }
  function oppScore(g) { const s = eaglesSide(g); return s === 'home' ? g.visitorScore : g.homeScore; }
  function fmtDate(g) { return g.isoDate; }
  function clockToElapsed(time, periodMins) {
    const p = time.split(':');
    return periodMins * 60 - parseInt(p[0]) * 60 - (parseInt(p[1]) || 0);
  }
  function fmtElapsed(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return m + ':' + String(s).padStart(2, '0');
  }

  const highlights = [];

  // --- Fastest Goal ---
  let fastestGoal = null;
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    g[side].scoring.forEach(goal => {
      if (goal.period === 1) {
        const elapsed = clockToElapsed(goal.time, 12);
        if (!fastestGoal || elapsed < fastestGoal.elapsed) {
          fastestGoal = { goal, elapsed, game: g };
        }
      }
    });
  });
  if (fastestGoal) {
    highlights.push({
      icon: '&#9889;', label: 'Fastest Goal',
      player: toTC(fastestGoal.goal.goalScorer), number: fastestGoal.goal.goalScorerNumber,
      value: fmtElapsed(fastestGoal.elapsed) + ' into the game',
      detail: 'P1 at ' + fastestGoal.goal.time + ' vs ' + opponent(fastestGoal.game),
      date: fmtDate(fastestGoal.game)
    });
  }

  // --- Fastest Two Consecutive Eagles Goals ---
  let fastestTwo = null;
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const goals = [...g[side].scoring].sort((a, b) => {
      if (a.period !== b.period) return a.period - b.period;
      const aE = clockToElapsed(a.time, 12), bE = clockToElapsed(b.time, 12);
      return aE - bE;
    });
    for (let i = 1; i < goals.length; i++) {
      const prev = goals[i - 1], cur = goals[i];
      const prevSecs = (prev.period - 1) * 12 * 60 + clockToElapsed(prev.time, 12);
      const curSecs = (cur.period - 1) * 12 * 60 + clockToElapsed(cur.time, 12);
      const diff = curSecs - prevSecs;
      if (diff > 0 && (!fastestTwo || diff < fastestTwo.diff)) {
        fastestTwo = { diff, prev, cur, game: g };
      }
    }
  });
  if (fastestTwo) {
    highlights.push({
      icon: '&#128293;', label: 'Fastest Two Goals',
      player: toTC(fastestTwo.prev.goalScorer) + ' & ' + toTC(fastestTwo.cur.goalScorer),
      number: '#' + fastestTwo.prev.goalScorerNumber + ' & #' + fastestTwo.cur.goalScorerNumber,
      value: fmtElapsed(fastestTwo.diff) + ' apart',
      detail: 'vs ' + opponent(fastestTwo.game),
      date: fmtDate(fastestTwo.game)
    });
  }

  // --- Hat Tricks (show all unique players) ---
  const hatTricks = [];
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const counts = {};
    g[side].scoring.forEach(goal => {
      const key = goal.goalScorer;
      if (!counts[key]) counts[key] = { name: goal.goalScorer, num: goal.goalScorerNumber, count: 0, game: g };
      counts[key].count++;
    });
    Object.values(counts).filter(c => c.count >= 3).forEach(c => hatTricks.push(c));
  });
  // Group by player
  const htByPlayer = {};
  hatTricks.forEach(ht => {
    if (!htByPlayer[ht.name]) htByPlayer[ht.name] = { name: ht.name, num: ht.num, count: 0, best: 0, bestGame: null };
    htByPlayer[ht.name].count++;
    if (ht.count > htByPlayer[ht.name].best) { htByPlayer[ht.name].best = ht.count; htByPlayer[ht.name].bestGame = ht.game; }
  });
  const htPlayers = Object.values(htByPlayer).sort((a, b) => b.count - a.count);
  if (htPlayers.length) {
    highlights.push({
      icon: '&#127946;', label: 'Hat Trick Club',
      player: hatTricks.length + ' hat tricks by ' + htPlayers.length + ' players',
      number: '',
      value: htPlayers.map(p => toTC(p.name) + ' (' + p.count + ')').join(', '),
      detail: 'Most in one game: ' + htPlayers[0].best + ' goals by ' + toTC(htPlayers[0].name),
      date: ''
    });
  }

  // --- Most Goals in a Single Game (pick the best non-Gauthier if possible, else best overall) ---
  const playerGameGoals = [];
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const counts = {};
    g[side].scoring.forEach(goal => {
      const key = goal.goalScorer;
      if (!counts[key]) counts[key] = { name: goal.goalScorer, num: goal.goalScorerNumber, count: 0, game: g };
      counts[key].count++;
    });
    Object.values(counts).forEach(c => playerGameGoals.push(c));
  });
  playerGameGoals.sort((a, b) => b.count - a.count);
  // Show top scorer, and if top is repeated, show a different player too
  const topGoalGame = playerGameGoals[0];
  if (topGoalGame) {
    highlights.push({
      icon: '&#127880;', label: 'Most Goals in a Game',
      player: toTC(topGoalGame.name), number: topGoalGame.num,
      value: topGoalGame.count + ' goals',
      detail: 'vs ' + opponent(topGoalGame.game) + ' (' + eaglesScore(topGoalGame.game) + '-' + oppScore(topGoalGame.game) + ')',
      date: fmtDate(topGoalGame.game)
    });
  }
  // Find best game by a different player
  const altGoalGame = playerGameGoals.find(p => p.name !== topGoalGame?.name && p.count >= 3);
  if (altGoalGame) {
    highlights.push({
      icon: '&#127881;', label: 'Best Game (Runner-Up)',
      player: toTC(altGoalGame.name), number: altGoalGame.num,
      value: altGoalGame.count + ' goals',
      detail: 'vs ' + opponent(altGoalGame.game) + ' (' + eaglesScore(altGoalGame.game) + '-' + oppScore(altGoalGame.game) + ')',
      date: fmtDate(altGoalGame.game)
    });
  }

  // --- Most Points in a Game (find best non-duplicate of goals leader) ---
  const playerGamePts = [];
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const pts = {};
    g[side].scoring.forEach(goal => {
      const gKey = goal.goalScorer;
      if (!pts[gKey]) pts[gKey] = { name: goal.goalScorer, num: goal.goalScorerNumber, g: 0, a: 0, game: g };
      pts[gKey].g++;
      [goal.assist1, goal.assist2].filter(Boolean).forEach(assist => {
        if (!pts[assist]) pts[assist] = { name: assist, num: '', g: 0, a: 0, game: g };
        pts[assist].a++;
      });
    });
    Object.values(pts).forEach(p => playerGamePts.push({ ...p, pts: p.g + p.a }));
  });
  playerGamePts.sort((a, b) => b.pts - a.pts);
  // Find best points game that's different from the goals leader if possible
  const topPtsPlayer = playerGamePts[0];
  const altPtsPlayer = playerGamePts.find(p => p.name !== topGoalGame?.name);
  const ptsHighlight = altPtsPlayer && altPtsPlayer.pts >= topPtsPlayer.pts - 1 ? altPtsPlayer : topPtsPlayer;
  if (ptsHighlight) {
    highlights.push({
      icon: '&#11088;', label: 'Most Points in a Game',
      player: toTC(ptsHighlight.name), number: ptsHighlight.num,
      value: ptsHighlight.pts + ' pts (' + ptsHighlight.g + 'G + ' + ptsHighlight.a + 'A)',
      detail: 'vs ' + opponent(ptsHighlight.game) + ' (' + eaglesScore(ptsHighlight.game) + '-' + oppScore(ptsHighlight.game) + ')',
      date: fmtDate(ptsHighlight.game)
    });
  }

  // --- Most Assists in a Single Game ---
  const playerGameAssists = [];
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const counts = {};
    g[side].scoring.forEach(goal => {
      [goal.assist1, goal.assist2].filter(Boolean).forEach(a => {
        if (!counts[a]) counts[a] = { name: a, count: 0, game: g };
        counts[a].count++;
      });
    });
    Object.values(counts).forEach(c => playerGameAssists.push(c));
  });
  playerGameAssists.sort((a, b) => b.count - a.count);
  const topAssistGame = playerGameAssists[0];
  if (topAssistGame) {
    highlights.push({
      icon: '&#129309;', label: 'Most Assists in a Game',
      player: toTC(topAssistGame.name), number: '',
      value: topAssistGame.count + ' assists',
      detail: 'vs ' + opponent(topAssistGame.game) + ' (' + eaglesScore(topAssistGame.game) + '-' + oppScore(topAssistGame.game) + ')',
      date: fmtDate(topAssistGame.game)
    });
  }

  // --- Shutouts ---
  const shutouts = eaglesGames.filter(g => oppScore(g) === 0);
  if (shutouts.length) {
    const goalies = {};
    shutouts.forEach(g => {
      const starter = g.eaglesStarter || 'Unknown';
      if (!goalies[starter]) goalies[starter] = [];
      goalies[starter].push(g);
    });
    const goalieList = Object.entries(goalies).map(([name, gms]) => toTC(name) + ' (' + gms.length + ')').join(', ');
    highlights.push({
      icon: '&#129345;', label: 'Shutouts',
      player: goalieList, number: '',
      value: shutouts.length + ' total shutouts',
      detail: shutouts.map(g => eaglesScore(g) + '-0 vs ' + opponent(g)).join(', '),
      date: ''
    });
  }

  // --- Biggest Win ---
  let biggestWin = null;
  eaglesGames.forEach(g => {
    const diff = eaglesScore(g) - oppScore(g);
    if (!biggestWin || diff > biggestWin.diff) biggestWin = { game: g, diff };
  });
  if (biggestWin && biggestWin.diff > 0) {
    highlights.push({
      icon: '&#128165;', label: 'Biggest Blowout',
      player: opponent(biggestWin.game), number: '',
      value: eaglesScore(biggestWin.game) + '-' + oppScore(biggestWin.game) + ' (' + biggestWin.diff + ' goal margin)',
      detail: (eaglesSide(biggestWin.game) === 'home' ? 'Home' : 'Away'),
      date: fmtDate(biggestWin.game)
    });
  }

  // --- Longest Win Streak ---
  let maxStreak = 0, curStreak = 0, streakEnd = 0;
  eaglesGames.forEach((g, i) => {
    const es = eaglesScore(g), os = oppScore(g);
    if (es > os) { curStreak++; if (curStreak > maxStreak) { maxStreak = curStreak; streakEnd = i; } }
    else curStreak = 0;
  });
  if (maxStreak >= 2) {
    const streakGames = eaglesGames.slice(streakEnd - maxStreak + 1, streakEnd + 1);
    highlights.push({
      icon: '&#128170;', label: 'Longest Win Streak',
      player: maxStreak + ' consecutive wins', number: '',
      value: streakGames.map(g => eaglesScore(g) + '-' + oppScore(g) + ' vs ' + opponent(g).split(' ').pop()).join(', '),
      detail: '',
      date: fmtDate(streakGames[0]) + ' to ' + fmtDate(streakGames[streakGames.length - 1])
    });
  }

  // --- Most Goals in a Single Period ---
  let bestPeriod = null;
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const byP = {};
    g[side].scoring.forEach(goal => { byP[goal.period] = (byP[goal.period] || 0) + 1; });
    Object.entries(byP).forEach(([p, c]) => {
      if (!bestPeriod || c > bestPeriod.count) bestPeriod = { period: p, count: c, game: g };
    });
  });
  if (bestPeriod) {
    highlights.push({
      icon: '&#127754;', label: 'Most Goals in a Period',
      player: bestPeriod.count + ' goals in P' + bestPeriod.period, number: '',
      value: 'vs ' + opponent(bestPeriod.game) + ' (' + eaglesScore(bestPeriod.game) + '-' + oppScore(bestPeriod.game) + ')',
      detail: '',
      date: fmtDate(bestPeriod.game)
    });
  }

  // --- Iron Men (played all games) ---
  const gamesPlayed = {};
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    g[side].roster.filter(p => p.status === 'active' && p.position !== 'G').forEach(p => {
      if (!gamesPlayed[p.name]) gamesPlayed[p.name] = 0;
      gamesPlayed[p.name]++;
    });
  });
  const totalGames = eaglesGames.length;
  const ironMen = Object.entries(gamesPlayed).filter(([_, gp]) => gp === totalGames).map(([n]) => toTC(n));
  if (ironMen.length) {
    highlights.push({
      icon: '&#129470;', label: 'Iron Men',
      player: ironMen.length + ' players suited up for all ' + totalGames + ' games', number: '',
      value: ironMen.join(', '),
      detail: '',
      date: ''
    });
  }

  // --- Unique Scorers ---
  const uniqueScorers = new Set();
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    g[side].scoring.forEach(goal => uniqueScorers.add(goal.goalScorer));
  });
  highlights.push({
    icon: '&#127919;', label: 'Scoring Depth',
    player: uniqueScorers.size + ' different goal scorers', number: '',
    value: [...uniqueScorers].map(s => toTC(s)).sort().join(', '),
    detail: '',
    date: ''
  });

  // --- First & Last Goal of the Season ---
  const allGoals = [];
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    g[side].scoring.forEach(goal => allGoals.push({ goal, game: g }));
  });
  if (allGoals.length >= 2) {
    const first = allGoals[0], last = allGoals[allGoals.length - 1];
    highlights.push({
      icon: '&#127942;', label: 'Season Bookends',
      player: 'First goal: ' + toTC(first.goal.goalScorer) + ' #' + first.goal.goalScorerNumber, number: '',
      value: 'Last goal: ' + toTC(last.goal.goalScorer) + ' #' + last.goal.goalScorerNumber,
      detail: first.game.isoDate + ' vs ' + opponent(first.game) + '  /  ' + last.game.isoDate + ' vs ' + opponent(last.game),
      date: ''
    });
  }

  // --- Highest Scoring Game ---
  let highestGame = null;
  eaglesGames.forEach(g => {
    const total = g.homeScore + g.visitorScore;
    if (!highestGame || total > highestGame.total) highestGame = { game: g, total };
  });
  if (highestGame) {
    highlights.push({
      icon: '&#128200;', label: 'Highest-Scoring Game',
      player: highestGame.total + ' combined goals', number: '',
      value: eaglesScore(highestGame.game) + '-' + oppScore(highestGame.game) + ' vs ' + opponent(highestGame.game),
      detail: '',
      date: fmtDate(highestGame.game)
    });
  }

  // --- Most PIM in a Game (by an Eagle) ---
  let topPIM = null;
  eaglesGames.forEach(g => {
    const side = eaglesSide(g);
    const playerPIM = {};
    g[side].penalties.forEach(p => {
      const key = p.player;
      if (!playerPIM[key]) playerPIM[key] = { name: p.player, num: p.number, pim: 0, pens: 0, game: g };
      playerPIM[key].pim += (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0);
      playerPIM[key].pens++;
    });
    Object.values(playerPIM).forEach(p => {
      if (!topPIM || p.pim > topPIM.pim) topPIM = p;
    });
  });
  if (topPIM) {
    highlights.push({
      icon: '&#128676;', label: 'Most PIM in a Game',
      player: toTC(topPIM.name), number: topPIM.num,
      value: topPIM.pim + ' PIM (' + topPIM.pens + ' penalty' + (topPIM.pens > 1 ? 'ies' : '') + ')',
      detail: 'vs ' + opponent(topPIM.game),
      date: fmtDate(topPIM.game)
    });
  }

  // Render cards
  const cards = highlights.map(h => {
    const numStr = h.number && !String(h.number).startsWith('#') ? '#' + h.number : (h.number || '');
    return '<div class="highlight-card">' +
      '<div class="highlight-icon">' + h.icon + '</div>' +
      '<div class="highlight-body">' +
        '<div class="highlight-label">' + h.label + '</div>' +
        '<div class="highlight-player">' + h.player + (numStr ? ' <span class="highlight-num">' + numStr + '</span>' : '') + '</div>' +
        '<div class="highlight-value">' + h.value + '</div>' +
        (h.detail ? '<div class="highlight-detail">' + h.detail + '</div>' : '') +
        (h.date ? '<div class="highlight-date">' + h.date + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  return '<div class="tab-panel" id="tab-highlights">' +
    '<div class="analytics-grid">' +
      '<div class="card full-width">' +
        '<div class="card-title">Season Highlights</div>' +
        '<div style="margin-bottom:16px;font-size:12px;color:var(--text-dim)">Notable achievements and records from the ' + totalGames + '-game season.</div>' +
        '<div class="highlights-grid">' + cards + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// Tab 8: Officials
function renderOfficials(games) {
  const eaglesGames = games.filter(g => g.homeTeam === TEAM || g.visitorTeam === TEAM);

  // Parse individual refs from comma-separated referee field
  function parseRefs(refStr) {
    if (!refStr) return [];
    return refStr.split(',').map(r => r.trim().replace(/\s+\d{2}$/, '')).filter(Boolean);
  }

  // Build per-referee stats
  const refStats = {};
  eaglesGames.forEach(g => {
    const refs = parseRefs(g.referee);
    const ourSide = getEaglesSide(g);
    const theirSide = ourSide === 'home' ? 'visitor' : 'home';
    const result = getResult(g);
    const opp = getOpponent(g);
    const ourPens = g[ourSide].penalties;
    const theirPens = g[theirSide].penalties;
    const ourPIM = ourPens.reduce((s, p) => s + (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0), 0);
    const theirPIM = theirPens.reduce((s, p) => s + (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0), 0);
    const ourScore = ourSide === 'home' ? g.homeScore : g.visitorScore;
    const oppScore = ourSide === 'home' ? g.visitorScore : g.homeScore;

    // Penalty codes
    const allPenCodes = {};
    [...ourPens, ...theirPens].forEach(p => { allPenCodes[p.code] = (allPenCodes[p.code] || 0) + 1; });

    refs.forEach(ref => {
      if (!refStats[ref]) refStats[ref] = {
        gp: 0, w: 0, l: 0, t: 0,
        eaglesPens: 0, oppPens: 0, eaglesPIM: 0, oppPIM: 0,
        totalPens: 0, totalPIM: 0,
        penCodes: {}, games: [],
        gf: 0, ga: 0
      };
      const rs = refStats[ref];
      rs.gp++;
      if (result === 'W') rs.w++; else if (result === 'L') rs.l++; else rs.t++;
      rs.eaglesPens += ourPens.length;
      rs.oppPens += theirPens.length;
      rs.eaglesPIM += ourPIM;
      rs.oppPIM += theirPIM;
      rs.totalPens += ourPens.length + theirPens.length;
      rs.totalPIM += ourPIM + theirPIM;
      rs.gf += ourScore;
      rs.ga += oppScore;
      Object.entries(allPenCodes).forEach(([code, count]) => {
        rs.penCodes[code] = (rs.penCodes[code] || 0) + count;
      });
      rs.games.push({ date: g.isoDate, opp, result, ourPens: ourPens.length, theirPens: theirPens.length, ourPIM, theirPIM, score: ourScore + '-' + oppScore });
    });
  });

  // Sort refs by games officiated
  const sortedRefs = Object.entries(refStats).sort((a, b) => b[1].gp - a[1].gp);

  // League-wide averages
  let totalGamePens = 0, totalGamePIM = 0;
  eaglesGames.forEach(g => {
    const ourSide = getEaglesSide(g);
    const theirSide = ourSide === 'home' ? 'visitor' : 'home';
    totalGamePens += g[ourSide].penalties.length + g[theirSide].penalties.length;
    totalGamePIM += g[ourSide].penalties.reduce((s, p) => s + (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0), 0);
    totalGamePIM += g[theirSide].penalties.reduce((s, p) => s + (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0), 0);
  });
  const avgPensPerGame = (totalGamePens / eaglesGames.length).toFixed(1);
  const avgPIMPerGame = (totalGamePIM / eaglesGames.length).toFixed(1);

  // Referee summary data for sortable table
  const _refTableData = sortedRefs.map(([name, rs]) => ({
    name, gp: rs.gp, w: rs.w, l: rs.l, t: rs.t,
    winPct: parseFloat(((rs.w + rs.t * 0.5) / rs.gp * 100).toFixed(1)),
    pensPerGame: parseFloat((rs.totalPens / rs.gp).toFixed(1)),
    pimPerGame: parseFloat((rs.totalPIM / rs.gp).toFixed(1)),
    eaglesPensPG: parseFloat((rs.eaglesPens / rs.gp).toFixed(1)),
    oppPensPG: parseFloat((rs.oppPens / rs.gp).toFixed(1)),
    penDiff: parseFloat((rs.eaglesPens / rs.gp - rs.oppPens / rs.gp).toFixed(1))
  }));
  window._refTableData = _refTableData;
  window._refAvgPens = parseFloat(avgPensPerGame);

  window.sortRefTable = function(col) {
    const tbody = document.getElementById('ref-summary-tbody');
    if (!tbody) return;
    const prev = tbody.dataset.sortCol;
    const prevDir = tbody.dataset.sortDir;
    const dir = prev === col && prevDir === 'desc' ? 'asc' : 'desc';
    tbody.dataset.sortCol = col;
    tbody.dataset.sortDir = dir;
    const data = [...window._refTableData];
    data.sort((a, b) => {
      const av = typeof a[col] === 'string' ? a[col].toLowerCase() : a[col];
      const bv = typeof b[col] === 'string' ? b[col].toLowerCase() : b[col];
      return dir === 'desc' ? (bv > av ? 1 : bv < av ? -1 : 0) : (av > bv ? 1 : av < bv ? -1 : 0);
    });
    const avgPens = window._refAvgPens;
    tbody.innerHTML = data.map(r => {
      const diffColor = r.penDiff > 0.5 ? 'color:var(--red)' : r.penDiff < -0.5 ? 'color:var(--green)' : '';
      const pensHL = r.pensPerGame > avgPens * 1.3 ? 'color:var(--yellow)' : r.pensPerGame < avgPens * 0.7 ? 'color:var(--green)' : '';
      return '<tr><td style="font-weight:600">' + r.name + '</td><td class="center mono">' + r.gp + '</td><td class="center mono" style="color:var(--green)">' + r.w + '</td><td class="center mono" style="color:var(--red)">' + r.l + '</td><td class="center mono" style="color:var(--yellow)">' + r.t + '</td><td class="center mono" style="font-weight:700">' + r.winPct.toFixed(0) + '%</td><td class="center mono" style="' + pensHL + '">' + r.pensPerGame.toFixed(1) + '</td><td class="center mono">' + r.pimPerGame.toFixed(1) + '</td><td class="center mono">' + r.eaglesPensPG.toFixed(1) + '</td><td class="center mono">' + r.oppPensPG.toFixed(1) + '</td><td class="center mono" style="' + diffColor + ';font-weight:700">' + (r.penDiff > 0 ? '+' : '') + r.penDiff.toFixed(1) + '</td></tr>';
    }).join('');
    // Update header arrows
    document.querySelectorAll('#ref-summary-thead th[data-col]').forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = th.dataset.col === col ? (dir === 'desc' ? ' ▼' : ' ▲') : '';
    });
  };

  const refRows = _refTableData.map(r => {
    const diffColor = r.penDiff > 0.5 ? 'color:var(--red)' : r.penDiff < -0.5 ? 'color:var(--green)' : '';
    const pensHL = r.pensPerGame > parseFloat(avgPensPerGame) * 1.3 ? 'color:var(--yellow)' : r.pensPerGame < parseFloat(avgPensPerGame) * 0.7 ? 'color:var(--green)' : '';
    return `<tr>
      <td style="font-weight:600">${r.name}</td>
      <td class="center mono">${r.gp}</td>
      <td class="center mono" style="color:var(--green)">${r.w}</td>
      <td class="center mono" style="color:var(--red)">${r.l}</td>
      <td class="center mono" style="color:var(--yellow)">${r.t}</td>
      <td class="center mono" style="font-weight:700">${r.winPct.toFixed(0)}%</td>
      <td class="center mono" style="${pensHL}">${r.pensPerGame.toFixed(1)}</td>
      <td class="center mono">${r.pimPerGame.toFixed(1)}</td>
      <td class="center mono">${r.eaglesPensPG.toFixed(1)}</td>
      <td class="center mono">${r.oppPensPG.toFixed(1)}</td>
      <td class="center mono" style="${diffColor};font-weight:700">${r.penDiff > 0 ? '+' : ''}${r.penDiff.toFixed(1)}</td>
    </tr>`;
  }).join('');

  // Refs with 2+ games — detailed cards
  const frequentRefs = sortedRefs.filter(([_, rs]) => rs.gp >= 2);
  const refCards = frequentRefs.map(([name, rs]) => {
    const winPct = ((rs.w + rs.t * 0.5) / rs.gp * 100).toFixed(0);
    const pensPerGame = (rs.totalPens / rs.gp).toFixed(1);

    // Top penalty codes for this ref
    const topCodes = Object.entries(rs.penCodes).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const maxCode = topCodes.length ? topCodes[0][1] : 1;
    const codeBars = topCodes.map(([code, count]) => {
      const pct = (count / maxCode) * 100;
      const codeName = PENALTY_NAMES[code] || code;
      return '<div class="bar-row"><span class="bar-label">' + code + '</span><div class="bar-track"><div class="bar-fill yellow" style="width:' + pct + '%"></div><span class="bar-text-outside">' + count + 'x ' + codeName + '</span></div></div>';
    }).join('');

    // Game log for this ref
    const gameRows = rs.games.map(g => {
      const rColor = g.result === 'W' ? 'color:var(--green)' : g.result === 'L' ? 'color:var(--red)' : 'color:var(--yellow)';
      const penDiff = g.ourPens - g.theirPens;
      const pdColor = penDiff > 0 ? 'color:var(--red)' : penDiff < 0 ? 'color:var(--green)' : '';
      return '<tr><td>' + g.date + '</td><td>' + g.opp + '</td><td class="center mono" style="' + rColor + ';font-weight:700">' + g.result + ' ' + g.score + '</td><td class="center mono">' + g.ourPens + '</td><td class="center mono">' + g.theirPens + '</td><td class="center mono" style="' + pdColor + '">' + (penDiff > 0 ? '+' : '') + penDiff + '</td><td class="center mono">' + (g.ourPIM + g.theirPIM) + '</td></tr>';
    }).join('');

    return `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">${name}</div>
        <div style="font-size:12px;color:var(--text-muted)">${rs.gp} games</div>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap">
        <div class="mini-stat"><div class="mini-val" style="color:var(--green)">${rs.w}</div><div class="mini-label">W</div></div>
        <div class="mini-stat"><div class="mini-val" style="color:var(--red)">${rs.l}</div><div class="mini-label">L</div></div>
        <div class="mini-stat"><div class="mini-val" style="color:var(--yellow)">${rs.t}</div><div class="mini-label">T</div></div>
        <div class="mini-stat"><div class="mini-val">${winPct}%</div><div class="mini-label">Win %</div></div>
        <div class="mini-stat"><div class="mini-val" style="color:var(--yellow)">${pensPerGame}</div><div class="mini-label">Pens/G</div></div>
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Top Calls</div>
      <div class="bar-chart" style="margin-bottom:12px">${codeBars || '<span style="color:var(--text-dim);font-size:12px">No penalties</span>'}</div>
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px">Game Log</div>
      <div class="table-wrap" style="max-height:180px;overflow-y:auto"><table>
        <thead><tr><th>Date</th><th>Opp</th><th class="center">Result</th><th class="center">Our P</th><th class="center">Opp P</th><th class="center">Diff</th><th class="center">PIM</th></tr></thead>
        <tbody>${gameRows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  // Penalty style analysis: which refs call tight vs loose
  const refsByPenRate = sortedRefs.filter(([_, rs]) => rs.gp >= 2).sort((a, b) => b[1].totalPens / b[1].gp - a[1].totalPens / a[1].gp);
  const maxPenRate = refsByPenRate.length ? refsByPenRate[0][1].totalPens / refsByPenRate[0][1].gp : 1;
  const penRateBars = refsByPenRate.map(([name, rs]) => {
    const rate = rs.totalPens / rs.gp;
    const pct = (rate / maxPenRate) * 100;
    const color = rate > parseFloat(avgPensPerGame) * 1.2 ? 'red' : rate < parseFloat(avgPensPerGame) * 0.8 ? 'green' : 'yellow';
    return '<div class="bar-row"><span class="bar-label" style="min-width:140px;font-size:11px">' + name + '</span><div class="bar-track"><div class="bar-fill ' + color + '" style="width:' + pct + '%"></div><span class="bar-text-outside">' + rate.toFixed(1) + ' pens/game (' + rs.gp + ' GP)</span></div></div>';
  }).join('');

  // Eagles penalty diff by ref (are we penalized more or less?)
  const refsByEaglesDiff = sortedRefs.filter(([_, rs]) => rs.gp >= 2).sort((a, b) => {
    return (a[1].eaglesPens / a[1].gp - a[1].oppPens / a[1].gp) - (b[1].eaglesPens / b[1].gp - b[1].oppPens / b[1].gp);
  });
  const maxDiffRate = Math.max(...refsByEaglesDiff.map(([_, rs]) => Math.abs(rs.eaglesPens / rs.gp - rs.oppPens / rs.gp)), 1);
  const eaglesDiffBars = refsByEaglesDiff.map(([name, rs]) => {
    const diff = rs.eaglesPens / rs.gp - rs.oppPens / rs.gp;
    const absDiff = Math.abs(diff);
    const pct = (absDiff / maxDiffRate) * 50;
    const isPos = diff > 0;
    const color = isPos ? 'red' : 'green';
    const label = (isPos ? '+' : '') + diff.toFixed(1) + ' pens/game vs opp';
    return '<div class="bar-row"><span class="bar-label" style="min-width:140px;font-size:11px">' + name + '</span><div class="bar-track"><div class="bar-fill ' + color + '" style="width:' + pct + '%;margin-left:' + (isPos ? '50' : (50 - pct)) + '%"></div><span class="bar-text-outside">' + label + ' (' + rs.gp + ' GP)</span></div></div>';
  }).join('');

  return `
    <div class="tab-panel" id="tab-officials">
      <div class="analytics-grid">
        <div class="card full-width">
          <div class="card-title">Referee Summary</div>
          <div style="margin-bottom:12px;font-size:12px;color:var(--text-dim)">League average: ${avgPensPerGame} penalties/game, ${avgPIMPerGame} PIM/game. Pen Diff = Eagles penalties/game minus opponent penalties/game (positive = more calls against us).</div>
          <div class="table-wrap">
            <table>
              <thead id="ref-summary-thead"><tr>
                <th data-col="name" onclick="sortRefTable('name')" style="cursor:pointer">Referee<span class="sort-arrow"></span></th>
                <th data-col="gp" onclick="sortRefTable('gp')" class="center" style="cursor:pointer">GP<span class="sort-arrow"></span></th>
                <th data-col="w" onclick="sortRefTable('w')" class="center" style="cursor:pointer">W<span class="sort-arrow"></span></th>
                <th data-col="l" onclick="sortRefTable('l')" class="center" style="cursor:pointer">L<span class="sort-arrow"></span></th>
                <th data-col="t" onclick="sortRefTable('t')" class="center" style="cursor:pointer">T<span class="sort-arrow"></span></th>
                <th data-col="winPct" onclick="sortRefTable('winPct')" class="center" style="cursor:pointer">Win %<span class="sort-arrow"></span></th>
                <th data-col="pensPerGame" onclick="sortRefTable('pensPerGame')" class="center" style="cursor:pointer">Pens/G<span class="sort-arrow"></span></th>
                <th data-col="pimPerGame" onclick="sortRefTable('pimPerGame')" class="center" style="cursor:pointer">PIM/G<span class="sort-arrow"></span></th>
                <th data-col="eaglesPensPG" onclick="sortRefTable('eaglesPensPG')" class="center" style="cursor:pointer">Eag P/G<span class="sort-arrow"></span></th>
                <th data-col="oppPensPG" onclick="sortRefTable('oppPensPG')" class="center" style="cursor:pointer">Opp P/G<span class="sort-arrow"></span></th>
                <th data-col="penDiff" onclick="sortRefTable('penDiff')" class="center" style="cursor:pointer">Pen Diff<span class="sort-arrow"></span></th>
              </tr></thead>
              <tbody id="ref-summary-tbody">${refRows}</tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Officiating Style: Penalties per Game</div>
          <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim)">Refs with 2+ games. <span style="color:var(--red)">Red</span> = tight whistle, <span style="color:var(--green)">green</span> = loose, <span style="color:var(--yellow)">yellow</span> = average.</div>
          <div class="bar-chart">${penRateBars || '<div class="no-data">Not enough data</div>'}</div>
        </div>

        <div class="card">
          <div class="card-title">Eagles Penalty Differential by Referee</div>
          <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim)">Refs with 2+ games. <span style="color:var(--red)">Red</span> = more calls against Eagles, <span style="color:var(--green)">green</span> = fewer.</div>
          <div class="bar-chart">${eaglesDiffBars || '<div class="no-data">Not enough data</div>'}</div>
        </div>

        <div class="card full-width">
          <div class="card-title">Referee Profiles (2+ games)</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px">
            ${refCards || '<div class="no-data">Not enough data for individual profiles</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

// Main
async function init() {
  try {
    const resp = await fetch('data/games.json?v=' + Date.now());
    DATA = await resp.json();
    allGames = DATA.games;

    // Update hero
    document.getElementById('hero-sub').textContent = `${DATA.metadata.division} — ${DATA.metadata.season} — ${allGames.length} Games`;

    const allStats = buildPlayerStats(allGames);
    const content = document.getElementById('content');

    content.innerHTML =
      renderOverview(allGames) +
      renderGameViewer(allGames) +
      renderRosters(allGames) +
      renderPlayerStats(allGames) +
      renderScouting(allGames) +
      renderAnalytics(allGames) +
      renderHighlights(allGames) +
      renderOfficials(allGames);

    // Wire up game log clicks
    content.querySelectorAll('tr.clickable[data-game-idx]').forEach(row => {
      row.addEventListener('click', () => {
        const idx = parseInt(row.dataset.gameIdx);
        openModal(renderGamesheet(allGames[idx]));
      });
    });

    // Wire up game viewer select
    const gameSelect = document.getElementById('game-select');
    if (gameSelect) {
      gameSelect.addEventListener('change', () => {
        document.getElementById('gamesheet-container').innerHTML = renderGamesheet(allGames[parseInt(gameSelect.value)]);
      });
    }

    // Wire up roster team select
    const rosterSelect = document.getElementById('roster-team-select');
    if (rosterSelect) {
      const renderSelectedRoster = () => {
        document.getElementById('roster-container').innerHTML = renderRosterForTeam(allGames, rosterSelect.value);
      };
      rosterSelect.addEventListener('change', renderSelectedRoster);
      renderSelectedRoster();
    }

    // Wire up player stats
    const statsFilter = document.getElementById('stats-team-filter');
    const statsSearch = document.getElementById('stats-search');
    const statsContainer = document.getElementById('stats-table-container');

    function refreshStats() {
      statsContainer.innerHTML = renderStatsTable(allStats, statsFilter.value, statsSearch.value);
      // Re-wire sort headers
      statsContainer.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (statsSortCol === col) {
            statsSortDir *= -1;
          } else {
            statsSortCol = col;
            statsSortDir = (col === 'name' || col === 'team' || col === 'position') ? 1 : -1;
          }
          refreshStats();
        });
      });
      // Wire up player profile links
      statsContainer.querySelectorAll('.player-link').forEach(el => {
        el.addEventListener('click', () => {
          openPlayerProfile(el.dataset.player, el.dataset.team);
        });
      });
    }

    if (statsFilter && statsSearch && statsContainer) {
      statsFilter.addEventListener('change', refreshStats);
      statsSearch.addEventListener('input', refreshStats);
      refreshStats();
    }

  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="loading" style="color:var(--red)">
        <div style="font-size:24px;margin-bottom:12px">Error Loading Data</div>
        <div style="font-size:14px;color:var(--text-muted)">${err.message}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:8px">Ensure data/games.json exists and the page is served via HTTP.</div>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
