<body>
<div class="dashboard-root">
  <div class="hero">
    <div class="hero-badge"><span class="hero-badge-dot"></span> GTHL / OHF</div>
    <h1>Toronto Eagles Dashboard</h1>
    <p id="hero-sub">Under 10 AA — 2025-2026 Season</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="overview">Season Overview</button>
    <button class="tab-btn" data-tab="gameviewer">Game Viewer</button>
    <button class="tab-btn" data-tab="rosters">Rosters</button>
    <button class="tab-btn" data-tab="playerstats">Player Stats</button>
    <button class="tab-btn" data-tab="scouting">Scouting Report</button>
    <button class="tab-btn" data-tab="analytics">Advanced Analytics</button>
    <button class="tab-btn" data-tab="highlights">Highlights</button>
    <button class="tab-btn" data-tab="officials">Officials</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      Loading gamesheet data...
    </div>
  </div>

  <footer>Toronto Eagles Gamesheet Dashboard</footer>
</div>

<div class="modal-overlay" id="modal">
  <button class="modal-close" id="modal-close">&times;</button>
  <div class="modal-content" id="modal-body"></div>
</div>

<script>
const TEAM = 'Toronto Eagles';
let DATA = null;
let allGames = [];

// Penalty code names
const PENALTY_NAMES = {
  'BC': 'Body Contact', 'BDG': 'Boarding', 'BM': 'Bench Minor', 'CC': 'Cross-Checking',
  'CFB': 'Contact from Behind', 'HC': 'Head Contact', 'HKG': 'Hooking', 'HO': 'Holding',
  'HTS': 'High-Sticking', 'INT': 'Interference', 'INTGT': 'Interference on Goaltender',
  'PS': 'Penalty Shot', 'RO': 'Roughing', 'SL': 'Slashing', 'SP': 'Spearing',
  'TMP': 'Too Many Players', 'TR': 'Tripping', 'USC': 'Unsportsmanlike Conduct',
  '7.5(a)': 'Delay of Game', '9.4(c)': 'Head Contact (9.4c)',
  '11.1(d)i': 'Striking (11.1d)', '11.4': 'Body Checking'
};

function toTitleCase(str) {
  return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function getEaglesSide(game) {
  if (game.homeTeam === TEAM) return 'home';
  if (game.visitorTeam === TEAM) return 'visitor';
  return null;
}

function getResult(game) {
  const side = getEaglesSide(game);
  if (!side) return null;
  const our = side === 'home' ? game.homeScore : game.visitorScore;
  const their = side === 'home' ? game.visitorScore : game.homeScore;
  if (our > their) return 'W';
  if (our < their) return 'L';
  return 'T';
}

function getOpponent(game) {
  return game.homeTeam === TEAM ? game.visitorTeam : game.homeTeam;
}

function getLocation(game) {
  return game.homeTeam === TEAM ? 'Home' : 'Away';
}

function getEaglesScore(game) {
  const side = getEaglesSide(game);
  return side === 'home' ? `${game.homeScore} - ${game.visitorScore}` : `${game.visitorScore} - ${game.homeScore}`;
}

function formatDate(isoDate) {
  const d = new Date(isoDate + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Tab management
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('tab-' + btn.dataset.tab);
    if (panel) panel.classList.add('active');
  });
});

// Modal
// Point production chart state and renderer
const _ppChartData = {};
function togglePointChart(pid, mode) {
  const d = _ppChartData[pid];
  if (!d || d.length === 0) return;
  const container = document.getElementById('ppChart_'+pid);
  const cumBtn = document.getElementById('ppChart_cum_'+pid);
  const pgBtn = document.getElementById('ppChart_pg_'+pid);
  if (!container || !cumBtn || !pgBtn) return;
  const isCum = mode === 'cumulative';
  cumBtn.style.background = isCum ? 'var(--accent)' : 'transparent';
  cumBtn.style.color = isCum ? 'var(--bg)' : 'var(--text-muted)';
  cumBtn.style.borderColor = isCum ? 'var(--accent)' : 'var(--border)';
  pgBtn.style.background = isCum ? 'transparent' : 'var(--accent)';
  pgBtn.style.color = isCum ? 'var(--text-muted)' : 'var(--bg)';
  pgBtn.style.borderColor = isCum ? 'var(--border)' : 'var(--accent)';
  const w = Math.max(d.length * 24, 300), h = 160, pad = 30;
  const maxVal = isCum ? Math.max(...d.map(p=>p.cumPts),1) : Math.max(...d.map(p=>p.pts),1);
  const xStep = d.length > 1 ? (w - pad*2) / (d.length - 1) : 0;
  function yPos(v) { return h - pad - (v / maxVal) * (h - pad*2); }
  function line(vals, color) {
    if (d.length === 1) return '<circle cx="'+pad+'" cy="'+yPos(vals[0])+'" r="4" fill="'+color+'"/>';
    let path = 'M';
    vals.forEach((v,i) => { path += (i?'L':'') + (pad+i*xStep) + ',' + yPos(v); });
    let dots = vals.map((v,i) => '<circle cx="'+(pad+i*xStep)+'" cy="'+yPos(v)+'" r="3" fill="'+color+'"/>').join('');
    return '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' + dots;
  }
  const ptsVals = isCum ? d.map(p=>p.cumPts) : d.map(p=>p.pts);
  const gVals = isCum ? d.map(p=>p.cumG) : d.map(p=>p.goals);
  const aVals = isCum ? d.map(p=>p.cumA) : d.map(p=>p.assists);
  let yLabels = '';
  for (let i = 0; i <= 5; i++) {
    const v = Math.round(maxVal * i / 5);
    const y = yPos(v);
    yLabels += '<text x="'+(pad-6)+'" y="'+(y+3)+'" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="end" font-family="IBM Plex Mono,monospace">'+v+'</text>';
    yLabels += '<line x1="'+pad+'" y1="'+y+'" x2="'+(w-pad)+'" y2="'+y+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
  }
  let xLabels = '';
  const step = Math.max(1, Math.floor(d.length / 10));
  d.forEach((p,i) => {
    if (i % step === 0 || i === d.length-1) {
      xLabels += '<text x="'+(pad+i*xStep)+'" y="'+(h-8)+'" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle" font-family="IBM Plex Mono,monospace">'+p.game+'</text>';
    }
  });
  let hovers = d.map((p,i) => {
    const x = pad+i*xStep;
    const label = isCum ? p.cumPts+'pts ('+p.cumG+'G+'+p.cumA+'A)' : p.pts+'pts ('+p.goals+'G+'+p.assists+'A)';
    return '<rect x="'+(x-8)+'" y="'+pad+'" width="16" height="'+(h-pad*2)+'" fill="transparent" style="cursor:help"><title>Game '+p.game+': '+p.date+' vs '+p.opp+'\n'+label+'</title></rect>';
  }).join('');
  container.innerHTML = '<svg width="'+w+'" height="'+h+'" style="display:block">'+yLabels+xLabels+line(aVals,'var(--purple)')+line(gVals,'var(--green)')+line(ptsVals,'var(--accent)')+hovers+'</svg>';
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Player Profile ──
function buildPlayerProfile(playerName, teamName) {
  const games = allGames;
  const isEagles = teamName === TEAM;

  // Build game log
  const gameLog = [];
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    const sideData = g[side];
    const inRoster = sideData.roster.some(p => p.name === playerName && p.status === 'active');
    if (!inRoster) return;

    const opponent = side === 'home' ? g.visitorTeam : g.homeTeam;
    const loc = side === 'home' ? 'Home' : 'Away';
    const teamScore = side === 'home' ? g.homeScore : g.visitorScore;
    const oppScore = side === 'home' ? g.visitorScore : g.homeScore;
    const result = teamScore > oppScore ? 'W' : teamScore < oppScore ? 'L' : 'T';

    let goals = 0, assists = 0, pim = 0;
    const penDetails = [];
    const goalDetails = [];

    sideData.scoring.forEach(s => {
      if (s.goalScorer === playerName) { goals++; goalDetails.push({ period: s.period, time: s.time, type: s.type }); }
      if (s.assist1 === playerName || s.assist2 === playerName) assists++;
    });
    sideData.penalties.forEach(p => {
      if (p.player === playerName) {
        const mins = typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0;
        pim += mins;
        penDetails.push({ period: p.period, minutes: mins, code: p.code });
      }
    });

    gameLog.push({
      date: g.date.split(' ')[0],
      isoDate: g.isoDate,
      opponent, loc, result, teamScore, oppScore,
      goals, assists, pts: goals + assists, pim,
      penDetails, goalDetails,
      gameType: g.gameType
    });
  });

  // Sort chronologically
  gameLog.sort((a, b) => a.isoDate.localeCompare(b.isoDate));

  const gp = gameLog.length;
  const totalG = gameLog.reduce((s, g) => s + g.goals, 0);
  const totalA = gameLog.reduce((s, g) => s + g.assists, 0);
  const totalPts = totalG + totalA;
  const totalPIM = gameLog.reduce((s, g) => s + g.pim, 0);
  const ppg = gp > 0 ? (totalPts / gp).toFixed(2) : '0.00';

  // Streaks
  let longestPtStreak = 0, curPtStreak = 0;
  let longestGStreak = 0, curGStreak = 0;
  let currentStreak = 0, currentStreakType = '';
  gameLog.forEach(g => {
    if (g.pts > 0) { curPtStreak++; longestPtStreak = Math.max(longestPtStreak, curPtStreak); } else { curPtStreak = 0; }
    if (g.goals > 0) { curGStreak++; longestGStreak = Math.max(longestGStreak, curGStreak); } else { curGStreak = 0; }
  });
  // Current streak (from most recent game backwards)
  if (gameLog.length > 0) {
    const recent = [...gameLog].reverse();
    if (recent[0].pts > 0) {
      currentStreakType = 'point';
      for (const g of recent) { if (g.pts > 0) currentStreak++; else break; }
    } else if (recent[0].goals > 0) {
      currentStreakType = 'goal';
      for (const g of recent) { if (g.goals > 0) currentStreak++; else break; }
    }
  }

  // Multi-point games
  const multiPtGames = gameLog.filter(g => g.pts >= 2).length;
  const hatTricks = gameLog.filter(g => g.goals >= 3).length;

  // Scoring by period
  const goalsByPeriod = { 1: 0, 2: 0, 3: 0 };
  const assistsByPeriod = { 1: 0, 2: 0, 3: 0 };
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    g[side].scoring.forEach(s => {
      if (s.goalScorer === playerName && goalsByPeriod[s.period] !== undefined) goalsByPeriod[s.period]++;
      if ((s.assist1 === playerName || s.assist2 === playerName) && assistsByPeriod[s.period] !== undefined) assistsByPeriod[s.period]++;
    });
  });

  // Home vs Away splits
  const homeGames = gameLog.filter(g => g.loc === 'Home');
  const awayGames = gameLog.filter(g => g.loc === 'Away');
  const homeSplit = { gp: homeGames.length, g: homeGames.reduce((s,g) => s+g.goals, 0), a: homeGames.reduce((s,g) => s+g.assists, 0), pim: homeGames.reduce((s,g) => s+g.pim, 0) };
  const awaySplit = { gp: awayGames.length, g: awayGames.reduce((s,g) => s+g.goals, 0), a: awayGames.reduce((s,g) => s+g.assists, 0), pim: awayGames.reduce((s,g) => s+g.pim, 0) };
  homeSplit.pts = homeSplit.g + homeSplit.a;
  awaySplit.pts = awaySplit.g + awaySplit.a;

  // Performance by opponent
  const byOpp = {};
  gameLog.forEach(g => {
    if (!byOpp[g.opponent]) byOpp[g.opponent] = { gp: 0, g: 0, a: 0, pts: 0, pim: 0 };
    byOpp[g.opponent].gp++;
    byOpp[g.opponent].g += g.goals;
    byOpp[g.opponent].a += g.assists;
    byOpp[g.opponent].pts += g.pts;
    byOpp[g.opponent].pim += g.pim;
  });

  // Penalty histogram
  const penByCodes = {};
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    g[side].penalties.forEach(p => {
      if (p.player === playerName) {
        penByCodes[p.code] = (penByCodes[p.code] || 0) + 1;
      }
    });
  });

  // Special teams goals
  let ppGoals = 0, shGoals = 0;
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    g[side].scoring.forEach(s => {
      if (s.goalScorer === playerName) {
        if (s.type === 'PP') ppGoals++;
        if (s.type === 'SH') shGoals++;
      }
    });
  });

  // Get player number and position
  let playerNumber = '';
  let playerPos = '';
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    const found = g[side].roster.find(p => p.name === playerName);
    if (found) { playerNumber = found.number; playerPos = found.position || 'S'; }
  });

  // ── Render ──
  const resultClass = r => r === 'W' ? 'color:var(--green)' : r === 'L' ? 'color:var(--red)' : 'color:var(--yellow)';

  // Game log rows
  const gameLogRows = gameLog.map(g => {
    const ptsStyle = g.pts > 0 ? 'color:var(--accent);font-weight:700' : '';
    const pimStyle = g.pim > 0 ? 'color:var(--yellow)' : '';
    return `<tr>
      <td>${g.date}</td>
      <td>${g.opponent}</td>
      <td class="center">${g.loc}</td>
      <td class="center" style="${resultClass(g.result)};font-weight:700">${g.result} ${g.teamScore}-${g.oppScore}</td>
      <td class="center mono">${g.goals || '-'}</td>
      <td class="center mono">${g.assists || '-'}</td>
      <td class="center mono" style="${ptsStyle}">${g.pts || '-'}</td>
      <td class="center mono" style="${pimStyle}">${g.pim || '-'}</td>
    </tr>`;
  }).join('');

  // Opponent breakdown rows
  const oppRows = Object.entries(byOpp).sort((a,b) => b[1].pts - a[1].pts).map(([opp, s]) => {
    return `<tr>
      <td>${opp}</td>
      <td class="center mono">${s.gp}</td>
      <td class="center mono">${s.g}</td>
      <td class="center mono">${s.a}</td>
      <td class="center mono" style="font-weight:700;color:var(--accent)">${s.pts}</td>
      <td class="center mono">${(s.pts/s.gp).toFixed(2)}</td>
      <td class="center mono" style="${s.pim > 0 ? 'color:var(--yellow)' : ''}">${s.pim}</td>
    </tr>`;
  }).join('');

  // Penalty histogram bars
  const penEntries = Object.entries(penByCodes).sort((a,b) => b[1] - a[1]);
  const maxPenCount = penEntries.length ? penEntries[0][1] : 1;
  const penBars = penEntries.map(([code, count]) => {
    const pct = (count / maxPenCount) * 100;
    const name = PENALTY_NAMES[code] || code;
    return `<div class="bar-row">
      <span class="bar-label">${code}</span>
      <div class="bar-track">
        <div class="bar-fill yellow" style="width:${pct}%"></div><span class="bar-text-outside">${count}x ${name}</span>
      </div>
    </div>`;
  }).join('');

  // Period scoring mini chart
  const maxPeriodVal = Math.max(...Object.values(goalsByPeriod), ...Object.values(assistsByPeriod), 1);
  const periodChart = [1, 2, 3].map(p => {
    const gH = (goalsByPeriod[p] / maxPeriodVal) * 80;
    const aH = (assistsByPeriod[p] / maxPeriodVal) * 80;
    return `<div class="period-bar-group">
      <div class="period-bar-pair">
        <div class="period-bar gf" style="height:${gH}px"><span class="bar-val">${goalsByPeriod[p]}</span></div>
        <div class="period-bar ga" style="height:${aH}px;background:linear-gradient(180deg, var(--purple), rgba(167,139,250,0.4))"><span class="bar-val" style="color:var(--purple)">${assistsByPeriod[p]}</span></div>
      </div>
      <span class="period-bar-label">P${p}</span>
    </div>`;
  }).join('');

  // Point streak visualization (last 15 games or all)
  const streakDots = gameLog.slice(-20).map(g => {
    const color = g.pts > 0 ? (g.pts >= 2 ? 'var(--accent)' : 'var(--green)') : 'var(--border)';
    const size = g.pts >= 3 ? '14px' : g.pts >= 2 ? '12px' : '10px';
    const title = `${g.date} vs ${g.opponent}: ${g.goals}G ${g.assists}A`;
    return `<div title="${title}" style="width:${size};height:${size};border-radius:50%;background:${color};flex-shrink:0;cursor:help"></div>`;
  }).join('');

  // Point production chart data (cumulative and per-game)
  const profileId = playerName.replace(/[^a-zA-Z0-9]/g, '_');
  let cumPts = 0, cumG = 0, cumA = 0;
  const pointChartData = gameLog.map((g, i) => {
    cumPts += g.pts; cumG += g.goals; cumA += g.assists;
    return { game: i + 1, date: g.date, opp: g.opponent, pts: g.pts, goals: g.goals, assists: g.assists, cumPts, cumG, cumA };
  });
  const maxCumPts = cumPts || 1;
  const maxPerGame = Math.max(...gameLog.map(g => g.pts), 1);
  const chartW = Math.max(gameLog.length * 24, 300);

  const html = `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <div style="width:56px;height:56px;border-radius:12px;background:${isEagles ? 'var(--accent-dim)' : 'var(--card-hover)'};border:1px solid ${isEagles ? 'rgba(56,189,248,0.3)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${isEagles ? 'var(--accent)' : 'var(--text)'}">#${playerNumber}</div>
        <div>
          <div style="font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif">${toTitleCase(playerName)}</div>
          <div style="font-size:13px;color:var(--text-muted)">${teamName} &bull; ${playerPos === 'G' ? 'Goaltender' : 'Skater'}</div>
        </div>
      </div>

      <div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:16px">
        <div class="mini-stat"><div class="mini-val">${gp}</div><div class="mini-label">GP</div></div>
        <div class="mini-stat"><div class="mini-val">${totalG}</div><div class="mini-label">Goals</div></div>
        <div class="mini-stat"><div class="mini-val">${totalA}</div><div class="mini-label">Assists</div></div>
        <div class="mini-stat" style="border-color:rgba(56,189,248,0.3)"><div class="mini-val" style="color:var(--accent)">${totalPts}</div><div class="mini-label">Points</div></div>
        <div class="mini-stat"><div class="mini-val">${ppg}</div><div class="mini-label">PPG</div></div>
        <div class="mini-stat"><div class="mini-val" style="${totalPIM > 0 ? 'color:var(--yellow)' : ''}">${totalPIM}</div><div class="mini-label">PIM</div></div>
      </div>

      <div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
        <div class="mini-stat"><div class="mini-val">${longestPtStreak}</div><div class="mini-label">Longest Point Streak</div></div>
        <div class="mini-stat"><div class="mini-val">${longestGStreak}</div><div class="mini-label">Longest Goal Streak</div></div>
        <div class="mini-stat"><div class="mini-val">${multiPtGames}</div><div class="mini-label">Multi-Point Games</div></div>
        <div class="mini-stat"><div class="mini-val">${hatTricks}</div><div class="mini-label">Hat Tricks</div></div>
        ${ppGoals > 0 ? `<div class="mini-stat"><div class="mini-val">${ppGoals}</div><div class="mini-label">PP Goals</div></div>` : ''}
        ${shGoals > 0 ? `<div class="mini-stat"><div class="mini-val">${shGoals}</div><div class="mini-label">SH Goals</div></div>` : ''}
        ${currentStreak > 1 ? `<div class="mini-stat" style="border-color:rgba(52,211,153,0.3)"><div class="mini-val" style="color:var(--green)">${currentStreak}</div><div class="mini-label">Current ${currentStreakType === 'point' ? 'Point' : 'Goal'} Streak</div></div>` : ''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">Recent Form (last ${Math.min(20, gameLog.length)} games)</div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:8px 0">${streakDots}</div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text-dim)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);vertical-align:middle"></span> 2+ pts</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);vertical-align:middle"></span> 1 pt</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--border);vertical-align:middle"></span> 0 pts</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Points by Period</div>
        <div class="period-breakdown" style="height:140px">
          ${periodChart}
        </div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text-dim);justify-content:center">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--accent);vertical-align:middle"></span> Goals</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--purple);vertical-align:middle"></span> Assists</span>
        </div>
      </div>
    </div>

    ${gameLog.length > 1 ? `<div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">Point Production</div>
        <div style="display:flex;gap:4px">
          <button id="ppChart_cum_${profileId}" onclick="togglePointChart('${profileId}','cumulative')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:var(--bg);font-size:11px;font-weight:600;cursor:pointer">Cumulative</button>
          <button id="ppChart_pg_${profileId}" onclick="togglePointChart('${profileId}','pergame')" style="padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer">Per Game</button>
        </div>
      </div>
      <div id="ppChart_${profileId}" style="overflow-x:auto"></div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text-dim)">
        <span><span style="display:inline-block;width:10px;height:3px;background:var(--accent);vertical-align:middle;border-radius:2px"></span> Points</span>
        <span><span style="display:inline-block;width:10px;height:3px;background:var(--green);vertical-align:middle;border-radius:2px"></span> Goals</span>
        <span><span style="display:inline-block;width:10px;height:3px;background:var(--purple);vertical-align:middle;border-radius:2px"></span> Assists</span>
      </div>
    </div>` : ''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">Home vs Away</div>
        <table>
          <thead><tr><th></th><th class="center">GP</th><th class="center">G</th><th class="center">A</th><th class="center">PTS</th><th class="center">PPG</th><th class="center">PIM</th></tr></thead>
          <tbody>
            <tr><td>Home</td><td class="center mono">${homeSplit.gp}</td><td class="center mono">${homeSplit.g}</td><td class="center mono">${homeSplit.a}</td><td class="center mono" style="font-weight:700">${homeSplit.pts}</td><td class="center mono">${homeSplit.gp > 0 ? (homeSplit.pts/homeSplit.gp).toFixed(2) : '-'}</td><td class="center mono">${homeSplit.pim}</td></tr>
            <tr><td>Away</td><td class="center mono">${awaySplit.gp}</td><td class="center mono">${awaySplit.g}</td><td class="center mono">${awaySplit.a}</td><td class="center mono" style="font-weight:700">${awaySplit.pts}</td><td class="center mono">${awaySplit.gp > 0 ? (awaySplit.pts/awaySplit.gp).toFixed(2) : '-'}</td><td class="center mono">${awaySplit.pim}</td></tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-title">Penalty Breakdown${totalPIM > 0 ? ` (${totalPIM} PIM)` : ''}</div>
        ${penBars ? `<div class="bar-chart">${penBars}</div>` : '<div style="color:var(--text-dim);font-size:13px;padding:16px 0">No penalties this season</div>'}
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Performance by Opponent</div>
      <table>
        <thead><tr><th>Opponent</th><th class="center">GP</th><th class="center">G</th><th class="center">A</th><th class="center">PTS</th><th class="center">PPG</th><th class="center">PIM</th></tr></thead>
        <tbody>${oppRows}</tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">Game Log</div>
      <div class="table-wrap" style="max-height:400px;overflow-y:auto">
        <table>
          <thead><tr><th>Date</th><th>Opponent</th><th class="center">Loc</th><th class="center">Result</th><th class="center">G</th><th class="center">A</th><th class="center">PTS</th><th class="center">PIM</th></tr></thead>
          <tbody>${gameLogRows}</tbody>
        </table>
      </div>
    </div>
  `;
  return { html, chartId: gameLog.length > 1 ? profileId : null, chartData: gameLog.length > 1 ? pointChartData : null };
}

function buildGoalieProfile(playerName, teamName) {
  const games = allGames;
  const isEagles = teamName === TEAM;

  // Get goalie number
  let playerNumber = '';
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    const found = g[side].roster.find(p => p.name === playerName);
    if (found) playerNumber = found.number;
  });

  // Build game log — games where this goalie was on the active roster
  const gameLog = [];
  games.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    const sideData = g[side];
    const inRoster = sideData.roster.some(p => p.name === playerName && p.status === 'active');
    if (!inRoster) return;

    const oppSide = side === 'home' ? 'visitor' : 'home';
    const opponent = g[oppSide === 'home' ? 'homeTeam' : 'visitorTeam'];
    const loc = side === 'home' ? 'Home' : 'Away';
    const teamScore = side === 'home' ? g.homeScore : g.visitorScore;
    const oppScore = side === 'home' ? g.visitorScore : g.homeScore;
    const result = teamScore > oppScore ? 'W' : teamScore < oppScore ? 'L' : 'T';

    // Determine starter status using eaglesStarter assignment data
    let started = 'unknown';
    if (isEagles && g.eaglesStarter) {
      started = g.eaglesStarter === playerName ? 'confirmed' : 'backup';
    } else {
      // For non-Eagles goalies, use goalieEvents
      const goalieEvents = sideData.goalieEvents || [];
      const wasStarter = goalieEvents.some(e => e.goalie === playerName && e.type === 'START');
      const otherGoalieStarted = goalieEvents.some(e => e.goalie !== playerName && e.type === 'START');
      started = wasStarter ? 'confirmed' : otherGoalieStarted ? 'backup' : 'unknown';
    }

    // Goals against = opponent scoring events
    const goalsAgainst = g[oppSide].scoring.length;

    // Goals against by period
    const gaByPeriod = { 1: 0, 2: 0, 3: 0 };
    g[oppSide].scoring.forEach(s => { if (gaByPeriod[s.period] !== undefined) gaByPeriod[s.period]++; });

    // Goal types against
    let ppGA = 0, shGA = 0;
    g[oppSide].scoring.forEach(s => {
      if (s.type === 'PP') ppGA++;
      if (s.type === 'SH') shGA++;
    });

    // Any assists by this goalie
    let assists = 0;
    sideData.scoring.forEach(s => {
      if (s.assist1 === playerName || s.assist2 === playerName) assists++;
    });

    // Penalties
    let pim = 0;
    sideData.penalties.forEach(p => {
      if (p.player === playerName) {
        pim += (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0);
      }
    });

    gameLog.push({
      date: g.date.split(' ')[0], isoDate: g.isoDate,
      opponent, loc, result, teamScore, oppScore,
      goalsAgainst, gaByPeriod, ppGA, shGA,
      assists, pim, started, gameType: g.gameType
    });
  });

  gameLog.sort((a, b) => a.isoDate.localeCompare(b.isoDate));

  const gpDressed = gameLog.length;
  const confirmedStarts = gameLog.filter(g => g.started === 'confirmed').length;
  const backupGames = gameLog.filter(g => g.started === 'backup').length;

  // For Eagles goalies with assignment data, only count games they actually played
  const hasAssignments = isEagles && gameLog.some(g => g.started !== 'unknown');
  const statsLog = hasAssignments ? gameLog.filter(g => g.started === 'confirmed') : gameLog;
  const gp = statsLog.length;

  const totalGA = statsLog.reduce((s, g) => s + g.goalsAgainst, 0);
  const gaa = gp > 0 ? (totalGA / gp).toFixed(2) : '0.00';
  const shutouts = statsLog.filter(g => g.goalsAgainst === 0).length;
  const wins = statsLog.filter(g => g.result === 'W').length;
  const losses = statsLog.filter(g => g.result === 'L').length;
  const ties = statsLog.filter(g => g.result === 'T').length;
  const winPct = gp > 0 ? ((wins + ties * 0.5) / gp * 100).toFixed(1) : '0.0';
  const totalAssists = statsLog.reduce((s, g) => s + g.assists, 0);
  const totalPIM = statsLog.reduce((s, g) => s + g.pim, 0);

  // GA by period totals
  const gaP1 = statsLog.reduce((s, g) => s + g.gaByPeriod[1], 0);
  const gaP2 = statsLog.reduce((s, g) => s + g.gaByPeriod[2], 0);
  const gaP3 = statsLog.reduce((s, g) => s + g.gaByPeriod[3], 0);
  const maxPeriodGA = Math.max(gaP1, gaP2, gaP3, 1);

  // Win/Loss streaks (use statsLog for accurate per-goalie streaks)
  let longestWStreak = 0, curWStreak = 0;
  let longestUnbeaten = 0, curUnbeaten = 0;
  statsLog.forEach(g => {
    if (g.result === 'W') { curWStreak++; longestWStreak = Math.max(longestWStreak, curWStreak); } else { curWStreak = 0; }
    if (g.result !== 'L') { curUnbeaten++; longestUnbeaten = Math.max(longestUnbeaten, curUnbeaten); } else { curUnbeaten = 0; }
  });

  // Current streak
  let currentStreak = 0, currentStreakType = '';
  if (statsLog.length > 0) {
    const last = statsLog[statsLog.length - 1].result;
    currentStreakType = last;
    for (let i = statsLog.length - 1; i >= 0; i--) {
      if (statsLog[i].result === last) currentStreak++;
      else break;
    }
  }

  // Consecutive shutout streak
  let longestSOStreak = 0, curSOStreak = 0;
  statsLog.forEach(g => {
    if (g.goalsAgainst === 0) { curSOStreak++; longestSOStreak = Math.max(longestSOStreak, curSOStreak); } else { curSOStreak = 0; }
  });

  // Home vs Away
  const homeGames = statsLog.filter(g => g.loc === 'Home');
  const awayGames = statsLog.filter(g => g.loc === 'Away');
  const homeSplit = {
    gp: homeGames.length,
    w: homeGames.filter(g => g.result === 'W').length,
    l: homeGames.filter(g => g.result === 'L').length,
    t: homeGames.filter(g => g.result === 'T').length,
    ga: homeGames.reduce((s,g) => s + g.goalsAgainst, 0),
    so: homeGames.filter(g => g.goalsAgainst === 0).length
  };
  homeSplit.gaa = homeSplit.gp > 0 ? (homeSplit.ga / homeSplit.gp).toFixed(2) : '-';
  const awaySplit = {
    gp: awayGames.length,
    w: awayGames.filter(g => g.result === 'W').length,
    l: awayGames.filter(g => g.result === 'L').length,
    t: awayGames.filter(g => g.result === 'T').length,
    ga: awayGames.reduce((s,g) => s + g.goalsAgainst, 0),
    so: awayGames.filter(g => g.goalsAgainst === 0).length
  };
  awaySplit.gaa = awaySplit.gp > 0 ? (awaySplit.ga / awaySplit.gp).toFixed(2) : '-';

  // Performance by opponent
  const byOpp = {};
  statsLog.forEach(g => {
    if (!byOpp[g.opponent]) byOpp[g.opponent] = { gp: 0, w: 0, l: 0, t: 0, ga: 0, so: 0 };
    byOpp[g.opponent].gp++;
    if (g.result === 'W') byOpp[g.opponent].w++;
    else if (g.result === 'L') byOpp[g.opponent].l++;
    else byOpp[g.opponent].t++;
    byOpp[g.opponent].ga += g.goalsAgainst;
    if (g.goalsAgainst === 0) byOpp[g.opponent].so++;
  });

  // GA distribution histogram
  const gaDistribution = {};
  statsLog.forEach(g => {
    gaDistribution[g.goalsAgainst] = (gaDistribution[g.goalsAgainst] || 0) + 1;
  });
  const maxGADist = Math.max(...Object.values(gaDistribution), 1);
  const gaDistBars = Object.entries(gaDistribution).sort((a,b) => parseInt(a[0]) - parseInt(b[0])).map(([ga, count]) => {
    const pct = (count / maxGADist) * 100;
    const label = ga === '0' ? 'Shutout' : ga + ' GA';
    const color = parseInt(ga) === 0 ? 'green' : parseInt(ga) <= 2 ? 'accent' : parseInt(ga) <= 4 ? 'yellow' : 'red';
    return `<div class="bar-row">
      <span class="bar-label">${ga} GA</span>
      <div class="bar-track">
        <div class="bar-fill ${color}" style="width:${pct}%"></div><span class="bar-text-outside">${count} game${count !== 1 ? 's' : ''}${parseInt(ga) === 0 ? ' (shutout)' : ''}</span>
      </div>
    </div>`;
  }).join('');

  // Period GA chart
  const periodChart = [1, 2, 3].map(p => {
    const val = p === 1 ? gaP1 : p === 2 ? gaP2 : gaP3;
    const h = (val / maxPeriodGA) * 80;
    return `<div class="period-bar-group">
      <div class="period-bar-pair">
        <div class="period-bar ga" style="height:${h}px"><span class="bar-val">${val}</span></div>
      </div>
      <span class="period-bar-label">P${p}</span>
    </div>`;
  }).join('');

  // Recent form dots (W/L/T)
  const formDots = statsLog.slice(-20).map(g => {
    const color = g.result === 'W' ? 'var(--green)' : g.result === 'L' ? 'var(--red)' : 'var(--yellow)';
    const title = `${g.date} vs ${g.opponent}: ${g.result} ${g.teamScore}-${g.oppScore} (${g.goalsAgainst} GA)`;
    return `<div title="${title}" style="width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0;cursor:help"></div>`;
  }).join('');

  const resultColor = r => r === 'W' ? 'color:var(--green)' : r === 'L' ? 'color:var(--red)' : 'color:var(--yellow)';

  // Game log rows
  const gameLogRows = gameLog.map(g => {
    const gaStyle = g.goalsAgainst === 0 ? 'color:var(--green);font-weight:700' : g.goalsAgainst >= 5 ? 'color:var(--red)' : '';
    const startIcon = g.started === 'confirmed' ? '<span title="Confirmed starter" style="color:var(--green)">S</span>' : g.started === 'backup' ? '<span title="Backup" style="color:var(--text-dim)">B</span>' : '';
    return `<tr>
      <td>${g.date}</td>
      <td>${g.opponent}</td>
      <td class="center">${g.loc}</td>
      <td class="center" style="${resultColor(g.result)};font-weight:700">${g.result} ${g.teamScore}-${g.oppScore}</td>
      <td class="center mono" style="${gaStyle}">${g.goalsAgainst}</td>
      <td class="center">${startIcon}</td>
      <td class="center mono">${g.assists || '-'}</td>
      <td class="center mono" style="${g.pim > 0 ? 'color:var(--yellow)' : ''}">${g.pim || '-'}</td>
    </tr>`;
  }).join('');

  // Opponent breakdown
  const oppRows = Object.entries(byOpp).sort((a,b) => a[1].ga/a[1].gp - b[1].ga/b[1].gp).map(([opp, s]) => {
    return `<tr>
      <td>${opp}</td>
      <td class="center mono">${s.gp}</td>
      <td class="center mono" style="color:var(--green)">${s.w}</td>
      <td class="center mono" style="color:var(--red)">${s.l}</td>
      <td class="center mono" style="color:var(--yellow)">${s.t}</td>
      <td class="center mono">${s.ga}</td>
      <td class="center mono">${(s.ga/s.gp).toFixed(2)}</td>
      <td class="center mono">${s.so > 0 ? '<span style="color:var(--green);font-weight:700">' + s.so + '</span>' : '-'}</td>
    </tr>`;
  }).join('');

  const streakColor = currentStreakType === 'W' ? 'var(--green)' : currentStreakType === 'L' ? 'var(--red)' : 'var(--yellow)';

  return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <div style="width:56px;height:56px;border-radius:12px;background:${isEagles ? 'var(--accent-dim)' : 'var(--card-hover)'};border:1px solid ${isEagles ? 'rgba(56,189,248,0.3)' : 'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${isEagles ? 'var(--accent)' : 'var(--text)'}">#${playerNumber}</div>
        <div>
          <div style="font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif">${toTitleCase(playerName)}</div>
          <div style="font-size:13px;color:var(--text-muted)">${teamName} &bull; Goaltender</div>
        </div>
      </div>

      <div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:16px">
        <div class="mini-stat"><div class="mini-val">${gp}</div><div class="mini-label">${hasAssignments ? 'Games Played' : 'Games Dressed'}</div></div>
        ${hasAssignments && gpDressed !== gp ? `<div class="mini-stat"><div class="mini-val">${gpDressed}</div><div class="mini-label">Games Dressed</div></div>` : ''}
        <div class="mini-stat" style="border-color:rgba(52,211,153,0.3)"><div class="mini-val" style="color:var(--green)">${wins}</div><div class="mini-label">Wins</div></div>
        <div class="mini-stat"><div class="mini-val" style="color:var(--red)">${losses}</div><div class="mini-label">Losses</div></div>
        <div class="mini-stat"><div class="mini-val" style="color:var(--yellow)">${ties}</div><div class="mini-label">Ties</div></div>
        <div class="mini-stat"><div class="mini-val">${winPct}%</div><div class="mini-label">Win %</div></div>
        <div class="mini-stat"><div class="mini-val">${totalGA}</div><div class="mini-label">Goals Against</div></div>
        <div class="mini-stat" style="border-color:rgba(56,189,248,0.3)"><div class="mini-val" style="color:var(--accent)">${gaa}</div><div class="mini-label">GAA</div></div>
        <div class="mini-stat" style="border-color:rgba(52,211,153,0.3)"><div class="mini-val" style="color:var(--green)">${shutouts}</div><div class="mini-label">Shutouts</div></div>
      </div>

      <div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
        <div class="mini-stat"><div class="mini-val">${longestWStreak}</div><div class="mini-label">Longest Win Streak</div></div>
        <div class="mini-stat"><div class="mini-val">${longestUnbeaten}</div><div class="mini-label">Longest Unbeaten</div></div>
        ${longestSOStreak > 0 ? `<div class="mini-stat"><div class="mini-val">${longestSOStreak}</div><div class="mini-label">Consecutive Shutouts</div></div>` : ''}
        ${confirmedStarts > 0 ? `<div class="mini-stat"><div class="mini-val">${confirmedStarts}</div><div class="mini-label">Confirmed Starts</div></div>` : ''}
        ${totalAssists > 0 ? `<div class="mini-stat"><div class="mini-val">${totalAssists}</div><div class="mini-label">Assists</div></div>` : ''}
        ${totalPIM > 0 ? `<div class="mini-stat"><div class="mini-val" style="color:var(--yellow)">${totalPIM}</div><div class="mini-label">PIM</div></div>` : ''}
        ${currentStreak > 1 ? `<div class="mini-stat"><div class="mini-val" style="color:${streakColor}">${currentStreak}</div><div class="mini-label">Current ${currentStreakType} Streak</div></div>` : ''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">Recent Form (last ${Math.min(20, statsLog.length)} games${hasAssignments ? ' played' : ''})</div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:8px 0">${formDots}</div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text-dim)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);vertical-align:middle"></span> Win</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);vertical-align:middle"></span> Loss</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--yellow);vertical-align:middle"></span> Tie</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Goals Against by Period</div>
        <div class="period-breakdown" style="height:140px">
          ${periodChart}
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">Goals Against Distribution</div>
        <div class="bar-chart">${gaDistBars}</div>
      </div>

      <div class="card">
        <div class="card-title">Home vs Away</div>
        <table>
          <thead><tr><th></th><th class="center">GP</th><th class="center">W</th><th class="center">L</th><th class="center">T</th><th class="center">GA</th><th class="center">GAA</th><th class="center">SO</th></tr></thead>
          <tbody>
            <tr><td>Home</td><td class="center mono">${homeSplit.gp}</td><td class="center mono">${homeSplit.w}</td><td class="center mono">${homeSplit.l}</td><td class="center mono">${homeSplit.t}</td><td class="center mono">${homeSplit.ga}</td><td class="center mono">${homeSplit.gaa}</td><td class="center mono">${homeSplit.so > 0 ? '<span style="color:var(--green)">' + homeSplit.so + '</span>' : '-'}</td></tr>
            <tr><td>Away</td><td class="center mono">${awaySplit.gp}</td><td class="center mono">${awaySplit.w}</td><td class="center mono">${awaySplit.l}</td><td class="center mono">${awaySplit.t}</td><td class="center mono">${awaySplit.ga}</td><td class="center mono">${awaySplit.gaa}</td><td class="center mono">${awaySplit.so > 0 ? '<span style="color:var(--green)">' + awaySplit.so + '</span>' : '-'}</td></tr>
          </tbody>
        </table>
        <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">${hasAssignments ? 'Note: Stats reflect only games played (not backup appearances). Saves/shots data is not available from gamesheets.' : 'Note: Stats reflect all games dressed. Two goalies often dress per game; saves/shots data is not available from gamesheets.'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Performance by Opponent</div>
      <table>
        <thead><tr><th>Opponent</th><th class="center">GP</th><th class="center">W</th><th class="center">L</th><th class="center">T</th><th class="center">GA</th><th class="center">GAA</th><th class="center">SO</th></tr></thead>
        <tbody>${oppRows}</tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">Game Log</div>
      <div class="table-wrap" style="max-height:400px;overflow-y:auto">
        <table>
          <thead><tr><th>Date</th><th>Opponent</th><th class="center">Loc</th><th class="center">Result</th><th class="center">GA</th><th class="center">Start</th><th class="center">A</th><th class="center">PIM</th></tr></thead>
          <tbody>${gameLogRows}</tbody>
        </table>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">S = Confirmed starter from gamesheet data. Blank = start status unknown.</div>
    </div>
  `;
}

function openPlayerProfile(playerName, teamName) {
  // Detect if player is a goalie
  let isGoalie = false;
  allGames.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : g.visitorTeam === teamName ? 'visitor' : null;
    if (!side) return;
    const found = g[side].roster.find(p => p.name === playerName && p.position === 'G');
    if (found) isGoalie = true;
  });

  if (isGoalie) {
    openModal(buildGoalieProfile(playerName, teamName));
  } else {
    const result = buildPlayerProfile(playerName, teamName);
    openModal(result.html);
    if (result.chartId && result.chartData) {
      _ppChartData[result.chartId] = result.chartData;
      togglePointChart(result.chartId, 'cumulative');
    }
  }
}

// Build all player stats across all games
function buildPlayerStats(games) {
  const players = {};
  games.forEach(game => {
    ['home', 'visitor'].forEach(side => {
      const teamName = side === 'home' ? game.homeTeam : game.visitorTeam;
      const sideData = game[side];
      // Track roster appearances
      sideData.roster.forEach(p => {
        if (p.status !== 'active') return;
        const key = `${teamName}|${p.name}`;
        if (!players[key]) {
          players[key] = { name: p.name, team: teamName, number: p.number, position: p.position, gp: 0, g: 0, a: 0, pts: 0, pim: 0, gameGoals: {} };
        }
        players[key].gp++;
        if (p.number && p.number !== players[key].number) {
          // Use most recent number
          players[key].number = p.number;
        }
        if (p.position === 'G') players[key].position = 'G';
      });
      // Track goals
      sideData.scoring.forEach(s => {
        const scorerKey = `${teamName}|${s.goalScorer}`;
        if (players[scorerKey]) {
          players[scorerKey].g++;
          players[scorerKey].pts++;
          if (!players[scorerKey].gameGoals[game.isoDate]) players[scorerKey].gameGoals[game.isoDate] = 0;
          players[scorerKey].gameGoals[game.isoDate]++;
        }
        if (s.assist1) {
          const a1Key = `${teamName}|${s.assist1}`;
          if (players[a1Key]) { players[a1Key].a++; players[a1Key].pts++; }
        }
        if (s.assist2) {
          const a2Key = `${teamName}|${s.assist2}`;
          if (players[a2Key]) { players[a2Key].a++; players[a2Key].pts++; }
        }
      });
      // Track PIM
      sideData.penalties.forEach(p => {
        const penKey = `${teamName}|${p.player}`;
        if (players[penKey]) {
          players[penKey].pim += (typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0);
        }
      });
    });
  });
  return Object.values(players);
}

function renderGamesheet(game) {
  const homeSide = game.home;
  const visSide = game.visitor;

  const renderRoster = (roster) => {
    const goalies = roster.filter(p => p.position === 'G' && p.status === 'active');
    const skaters = roster.filter(p => p.position !== 'G' && p.status === 'active');
    const scratches = roster.filter(p => p.status === 'inactive');
    let html = '';
    goalies.forEach(p => {
      html += `<div class="player-row"><span class="player-num">#${p.number}</span><span class="player-name">${toTitleCase(p.name)}</span><span class="player-pos">G</span></div>`;
    });
    skaters.sort((a,b) => a.number - b.number).forEach(p => {
      html += `<div class="player-row"><span class="player-num">#${p.number}</span><span class="player-name">${toTitleCase(p.name)}</span><span class="player-pos"></span></div>`;
    });
    if (scratches.length) {
      html += `<div style="margin-top:8px;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;">Scratches</div>`;
      scratches.forEach(p => {
        html += `<div class="player-row" style="opacity:0.5"><span class="player-num">#${p.number}</span><span class="player-name">${toTitleCase(p.name)}</span><span class="player-pos">${p.position === 'G' ? 'G' : ''}</span></div>`;
      });
    }
    return html;
  };

  const renderOfficials = (officials) => {
    return officials.map(o => {
      const roleLabel = o.role === 'CO' ? 'Head Coach' : o.role === 'AC' ? 'Asst. Coach' : o.role === 'TR' ? 'Trainer' : o.role === 'MG' ? 'Manager' : o.role;
      return `<div class="player-row"><span class="player-num" style="width:80px">${roleLabel}</span><span class="player-name">${toTitleCase(o.name)}</span></div>`;
    }).join('');
  };

  // Build combined scoring timeline
  const allGoals = [];
  homeSide.scoring.forEach(s => allGoals.push({ ...s, side: 'home', team: game.homeTeam }));
  visSide.scoring.forEach(s => allGoals.push({ ...s, side: 'visitor', team: game.visitorTeam }));
  allGoals.sort((a, b) => {
    if (a.period !== b.period) return a.period - b.period;
    // Time counts down, so higher time = earlier in period
    return parseFloat(b.time.replace(':', '.')) - parseFloat(a.time.replace(':', '.'));
  });

  let scoringHtml = '';
  if (allGoals.length === 0) {
    scoringHtml = '<div class="no-data">No goals scored</div>';
  } else {
    scoringHtml = '<ul class="scoring-timeline">';
    let runHome = 0, runVis = 0;
    allGoals.forEach(g => {
      if (g.side === 'home') runHome++; else runVis++;
      const assists = [g.assist1, g.assist2].filter(Boolean).map(a => toTitleCase(a)).join(', ');
      const goalType = g.type ? ` <span style="color:var(--yellow);font-size:11px;font-family:'IBM Plex Mono',monospace">(${g.type})</span>` : '';
      scoringHtml += `<li>
        <span class="period-badge">P${g.period}</span>
        <span class="time">${g.time}</span>
        <span class="run-score">${runHome}-${runVis}</span>
        <div>
          <span class="scorer">#${g.goalScorerNumber} ${toTitleCase(g.goalScorer)}</span>${goalType}<br/>
          <span class="assists">${assists ? 'Assists: ' + assists : 'Unassisted'}</span>
        </div>
        <span class="team-indicator ${g.side}">${g.side === 'home' ? 'HOME' : 'VIS'}</span>
      </li>`;
    });
    scoringHtml += '</ul>';
  }

  // Penalties
  const renderPenalties = (penalties, teamName) => {
    if (!penalties.length) return '<div class="no-data" style="padding:12px">No penalties</div>';
    return '<ul class="penalty-list">' + penalties.map(p =>
      `<li>
        <span class="pen-period">P${p.period}</span>
        <span class="pen-code">${p.code}</span>
        <span style="flex:1">#${p.number} ${toTitleCase(p.player)}</span>
        <span class="pen-min">${p.minutes} min</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim)">${p.startTime}-${p.endTime}</span>
      </li>`
    ).join('') + '</ul>';
  };

  const homeIsEagles = game.homeTeam === TEAM;
  const homeClass = homeIsEagles ? ' eagles' : '';
  const visClass = !homeIsEagles && game.visitorTeam === TEAM ? ' eagles' : '';

  return `
    <div class="gamesheet">
      <div class="gamesheet-header">
        <div class="game-meta">${formatDate(game.isoDate)} &mdash; ${game.arena} &mdash; <span class="game-type-badge ${game.gameType}">${game.gameType === 'PO' ? 'PLAYOFF' : 'LEAGUE'}</span></div>
        <div class="teams-display">
          <span class="team-name home${homeClass}">${game.homeTeam}</span>
          <span class="score-display">${game.homeScore}<span class="score-sep">-</span>${game.visitorScore}</span>
          <span class="team-name visitor${visClass}">${game.visitorTeam}</span>
        </div>
        <div class="game-meta">Referee: ${game.referee || 'N/A'}${game.linesman ? ' | Linesman: ' + game.linesman : ''} | Periods: ${game.periodLengths}</div>
      </div>

      <div class="gamesheet-section">
        <h3>${game.homeTeam} — Roster (Home)</h3>
        <div class="roster-mini">${renderRoster(homeSide.roster)}</div>
        <h3 style="margin-top:16px">Coaching Staff</h3>
        <div class="roster-mini">${renderOfficials(homeSide.officials)}</div>
      </div>

      <div class="gamesheet-section">
        <h3>${game.visitorTeam} — Roster (Visitor)</h3>
        <div class="roster-mini">${renderRoster(visSide.roster)}</div>
        <h3 style="margin-top:16px">Coaching Staff</h3>
        <div class="roster-mini">${renderOfficials(visSide.officials)}</div>
      </div>

      <div class="gamesheet-section scoring-full">
        <h3>Scoring Summary</h3>
        ${(() => {
          const allPens = [];
          homeSide.penalties.forEach(p => allPens.push({ ...p, side: 'home' }));
          visSide.penalties.forEach(p => allPens.push({ ...p, side: 'visitor' }));
          if (allGoals.length === 0 && allPens.length === 0) return '';

          const tlW = 780, tlH = 200, tlPad = 80, tlMid = 76;
          const penZone = tlH - 30; // y region for penalties below goals
          const periodW = (tlW - tlPad * 2) / 3;
          const periodMins = 12;

          function timeToX(period, time) {
            const parts = time.split(':');
            const mins = parseInt(parts[0]);
            const secs = parseInt(parts[1]) || 0;
            const elapsed = periodMins - mins - secs / 60;
            return tlPad + (period - 1) * periodW + (elapsed / periodMins) * periodW;
          }

          // Period dividers and labels
          let tlSvg = '';
          for (let p = 0; p < 3; p++) {
            const x0 = tlPad + p * periodW;
            tlSvg += '<rect x="' + x0 + '" y="8" width="' + periodW + '" height="' + (tlH - 16) + '" rx="4" fill="' + (p % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)') + '"/>';
            tlSvg += '<text x="' + (x0 + periodW / 2) + '" y="22" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle" font-family="IBM Plex Mono,monospace">Period ' + (p + 1) + '</text>';
            if (p > 0) tlSvg += '<line x1="' + x0 + '" y1="8" x2="' + x0 + '" y2="' + (tlH - 8) + '" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3,3"/>';
          }
          // Center line (goals zone)
          tlSvg += '<line x1="' + tlPad + '" y1="' + tlMid + '" x2="' + (tlW - tlPad) + '" y2="' + tlMid + '" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>';
          // Penalty zone separator
          const penLineY = tlMid + 50;
          tlSvg += '<line x1="' + tlPad + '" y1="' + penLineY + '" x2="' + (tlW - tlPad) + '" y2="' + penLineY + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
          // Team labels
          tlSvg += '<text x="' + (tlPad - 4) + '" y="' + (tlMid - 8) + '" fill="' + (homeIsEagles ? 'var(--accent)' : 'rgba(255,255,255,0.4)') + '" font-size="9" text-anchor="end" font-family="IBM Plex Mono,monospace">' + game.homeTeam.split(' ').pop() + '</text>';
          tlSvg += '<text x="' + (tlPad - 4) + '" y="' + (tlMid + 14) + '" fill="' + (!homeIsEagles && game.visitorTeam === TEAM ? 'var(--accent)' : 'rgba(255,255,255,0.4)') + '" font-size="9" text-anchor="end" font-family="IBM Plex Mono,monospace">' + game.visitorTeam.split(' ').pop() + '</text>';
          // Penalty zone labels
          tlSvg += '<text x="' + (tlPad - 4) + '" y="' + (penLineY + 14) + '" fill="rgba(255,255,255,0.25)" font-size="8" text-anchor="end" font-family="IBM Plex Mono,monospace">PEN</text>';

          // Plot goals
          let runH = 0, runV = 0;
          const homeGoalColor = homeIsEagles ? 'var(--accent)' : 'var(--red)';
          const visGoalColor = (!homeIsEagles && game.visitorTeam === TEAM) ? 'var(--accent)' : 'var(--red)';
          const homeStack = {}, visStack = {};
          allGoals.forEach(g => {
            const x = timeToX(g.period, g.time);
            const xKey = Math.round(x);
            if (g.side === 'home') {
              runH++;
              if (!homeStack[xKey]) homeStack[xKey] = 0;
              const yOff = homeStack[xKey] * 24;
              homeStack[xKey]++;
              const y = tlMid - 14 - yOff;
              const color = homeGoalColor;
              tlSvg += '<line x1="' + x + '" y1="' + tlMid + '" x2="' + x + '" y2="' + (y + 9) + '" stroke="' + color + '" stroke-width="1" opacity="0.4"/>';
              tlSvg += '<circle cx="' + x + '" cy="' + y + '" r="9" fill="' + color + '" opacity="0.9" style="cursor:help"><title>GOAL P' + g.period + ' ' + g.time + ' — #' + g.goalScorerNumber + ' ' + g.goalScorer + (g.type ? ' (' + g.type + ')' : '') + '\\n' + runH + '-' + runV + '</title></circle>';
              tlSvg += '<text x="' + x + '" y="' + (y + 4) + '" fill="white" font-size="10" text-anchor="middle" font-family="IBM Plex Mono,monospace" style="pointer-events:none">' + g.goalScorerNumber + '</text>';
            } else {
              runV++;
              if (!visStack[xKey]) visStack[xKey] = 0;
              const yOff = visStack[xKey] * 24;
              visStack[xKey]++;
              const y = tlMid + 14 + yOff;
              const color = visGoalColor;
              tlSvg += '<line x1="' + x + '" y1="' + tlMid + '" x2="' + x + '" y2="' + (y - 9) + '" stroke="' + color + '" stroke-width="1" opacity="0.4"/>';
              tlSvg += '<circle cx="' + x + '" cy="' + y + '" r="9" fill="' + color + '" opacity="0.9" style="cursor:help"><title>GOAL P' + g.period + ' ' + g.time + ' — #' + g.goalScorerNumber + ' ' + g.goalScorer + (g.type ? ' (' + g.type + ')' : '') + '\\n' + runH + '-' + runV + '</title></circle>';
              tlSvg += '<text x="' + x + '" y="' + (y + 4) + '" fill="white" font-size="10" text-anchor="middle" font-family="IBM Plex Mono,monospace" style="pointer-events:none">' + g.goalScorerNumber + '</text>';
            }
          });

          // Plot penalties as small squares below the penalty line
          const homePenStack = {}, visPenStack = {};
          allPens.forEach(p => {
            const time = p.offTime || p.startTime;
            if (!time || !p.period) return;
            const x = timeToX(p.period, time);
            const xKey = Math.round(x);
            const isHome = p.side === 'home';
            const stack = isHome ? homePenStack : visPenStack;
            if (!stack[xKey]) stack[xKey] = 0;
            const yOff = stack[xKey] * 18;
            stack[xKey]++;
            const y = penLineY + 10 + yOff;
            const isEaglesPen = (isHome && homeIsEagles) || (!isHome && !homeIsEagles && game.visitorTeam === TEAM);
            const color = isEaglesPen ? 'var(--accent)' : 'var(--red)';
            const penName = PENALTY_NAMES[p.code] || p.code;
            const mins = typeof p.minutes === 'number' ? p.minutes : parseInt(p.minutes) || 0;
            tlSvg += '<rect x="' + (x - 6) + '" y="' + (y - 6) + '" width="12" height="12" rx="2" fill="' + color + '" opacity="0.7" style="cursor:help"><title>PENALTY P' + p.period + ' ' + time + ' — #' + p.number + ' ' + p.player + '\\n' + penName + ' (' + mins + ' min)</title></rect>';
            tlSvg += '<text x="' + x + '" y="' + (y + 3) + '" fill="white" font-size="8" text-anchor="middle" font-family="IBM Plex Mono,monospace" style="pointer-events:none">' + p.number + '</text>';
          });

          // Draw penalty duration bars (time off to on), handling cross-period penalties
          allPens.forEach(p => {
            const start = p.startTime;
            const end = p.onTime || p.endTime;
            if (!start || !end || !p.period) return;
            const isHome = p.side === 'home';
            const isEaglesPen = (isHome && homeIsEagles) || (!isHome && !homeIsEagles && game.visitorTeam === TEAM);
            const color = isEaglesPen ? 'var(--accent)' : 'var(--red)';
            const startParts = start.split(':');
            const endParts = end.split(':');
            const startElapsed = periodMins - parseInt(startParts[0]) - (parseInt(startParts[1]) || 0) / 60;
            const endElapsed = periodMins - parseInt(endParts[0]) - (parseInt(endParts[1]) || 0) / 60;
            if (endElapsed > startElapsed) {
              // Penalty stays within same period
              const x1 = timeToX(p.period, start);
              const x2 = tlPad + (p.period - 1) * periodW + (endElapsed / periodMins) * periodW;
              tlSvg += '<rect x="' + x1 + '" y="' + (penLineY - 3) + '" width="' + Math.max(x2 - x1, 2) + '" height="3" rx="1" fill="' + color + '" opacity="0.2"/>';
            } else if (p.period < 3) {
              // Penalty crosses into next period
              // Part 1: from start to end of current period
              const x1 = timeToX(p.period, start);
              const x1End = tlPad + p.period * periodW;
              if (x1End > x1) {
                tlSvg += '<rect x="' + x1 + '" y="' + (penLineY - 3) + '" width="' + (x1End - x1) + '" height="3" rx="1" fill="' + color + '" opacity="0.2"/>';
              }
              // Part 2: from start of next period to end time
              const nextPeriod = p.period + 1;
              const endElapsedNext = periodMins - parseInt(endParts[0]) - (parseInt(endParts[1]) || 0) / 60;
              if (endElapsedNext > 0) {
                const x2Start = tlPad + (nextPeriod - 1) * periodW;
                const x2End = x2Start + (endElapsedNext / periodMins) * periodW;
                tlSvg += '<rect x="' + x2Start + '" y="' + (penLineY - 3) + '" width="' + Math.max(x2End - x2Start, 2) + '" height="3" rx="1" fill="' + color + '" opacity="0.2"/>';
              }
            }
          });

          // Running score at end
          tlSvg += '<text x="' + (tlW - tlPad + 8) + '" y="' + (tlMid + 4) + '" fill="var(--text)" font-size="13" font-weight="700" font-family="IBM Plex Mono,monospace">' + game.homeScore + '-' + game.visitorScore + '</text>';

          // Legend
          const legend = '<div style="display:flex;gap:16px;font-size:10px;color:var(--text-dim);margin-top:4px"><span><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="var(--accent)"/></svg> Eagles goal</span><span><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="var(--red)"/></svg> Opponent goal</span><span><svg width="12" height="12"><rect x="2" y="2" width="8" height="8" rx="2" fill="var(--accent)" opacity="0.7"/></svg> Eagles penalty</span><span><svg width="12" height="12"><rect x="2" y="2" width="8" height="8" rx="2" fill="var(--red)" opacity="0.7"/></svg> Opponent penalty</span></div>';

          return '<div style="overflow-x:auto;margin-bottom:16px"><svg width="' + tlW + '" height="' + tlH + '" style="display:block;margin:0 auto">' + tlSvg + '</svg>' + legend + '</div>';
        })()}
        ${scoringHtml}
      </div>

      <div class="gamesheet-section">
        <h3>${game.homeTeam} — Penalties</h3>
        ${renderPenalties(homeSide.penalties, game.homeTeam)}
      </div>

      <div class="gamesheet-section">
        <h3>${game.visitorTeam} — Penalties</h3>
        ${renderPenalties(visSide.penalties, game.visitorTeam)}
      </div>
    </div>
  `;
}

// Tab 1: Season Overview
function renderOverview(games) {
  const eaglesGames = games.filter(g => g.homeTeam === TEAM || g.visitorTeam === TEAM);
  let wins = 0, losses = 0, ties = 0, gf = 0, ga = 0;
  eaglesGames.forEach(g => {
    const r = getResult(g);
    if (r === 'W') wins++;
    else if (r === 'L') losses++;
    else ties++;
    const side = getEaglesSide(g);
    gf += side === 'home' ? g.homeScore : g.visitorScore;
    ga += side === 'home' ? g.visitorScore : g.homeScore;
  });
  const diff = gf - ga;
  const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
  const diffClass = diff > 0 ? 'green' : diff < 0 ? 'red' : 'accent';

  // Separate LG and PO
  const lgGames = eaglesGames.filter(g => g.gameType === 'LG');
  const poGames = eaglesGames.filter(g => g.gameType === 'PO');
  let lgW = 0, lgL = 0, lgT = 0, poW = 0, poL = 0, poT = 0;
  lgGames.forEach(g => { const r = getResult(g); if (r === 'W') lgW++; else if (r === 'L') lgL++; else lgT++; });
  poGames.forEach(g => { const r = getResult(g); if (r === 'W') poW++; else if (r === 'L') poL++; else poT++; });

  // Recent form (last 10)
  const recent = eaglesGames.slice(-10);
  const formDots = recent.map(g => {
    const r = getResult(g);
    return `<div class="form-dot ${r}" title="${formatDate(g.isoDate)} vs ${getOpponent(g)}">${r}</div>`;
  }).join('');

  // Win streak / current streak
  let streak = 0;
  let streakType = '';
  for (let i = eaglesGames.length - 1; i >= 0; i--) {
    const r = getResult(eaglesGames[i]);
    if (streakType === '') streakType = r;
    if (r === streakType) streak++;
    else break;
  }

  // Game log table
  let tableRows = '';
  eaglesGames.forEach((g, idx) => {
    const r = getResult(g);
    const opp = getOpponent(g);
    const loc = getLocation(g);
    const score = getEaglesScore(g);
    tableRows += `<tr class="clickable" data-game-idx="${games.indexOf(g)}">
      <td>${formatDate(g.isoDate)}</td>
      <td>${opp}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:600">${score}</td>
      <td><span class="result-badge ${r}">${r}</span></td>
      <td>${loc}</td>
      <td><span class="game-type-badge ${g.gameType}">${g.gameType}</span></td>
      <td style="font-size:12px;color:var(--text-dim)">${g.arena}</td>
    </tr>`;
  });

  return `
    <div class="tab-panel active" id="tab-overview">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Record</div>
          <div class="stat-value accent">${wins}-${losses}-${ties}</div>
          <div class="stat-sub">${eaglesGames.length} games played</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Goals For</div>
          <div class="stat-value green">${gf}</div>
          <div class="stat-sub">${(gf / eaglesGames.length).toFixed(1)} per game</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Goals Against</div>
          <div class="stat-value red">${ga}</div>
          <div class="stat-sub">${(ga / eaglesGames.length).toFixed(1)} per game</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Goal Diff</div>
          <div class="stat-value ${diffClass}">${diffStr}</div>
          <div class="stat-sub">GF ${gf} / GA ${ga}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Current Streak</div>
          <div class="stat-value ${streakType === 'W' ? 'green' : streakType === 'L' ? 'red' : 'accent'}">${streak}${streakType}</div>
          <div class="stat-sub">${streakType === 'W' ? 'Wins' : streakType === 'L' ? 'Losses' : 'Ties'} in a row</div>
        </div>
      </div>

      ${poGames.length ? `
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">League Record</div>
          <div class="stat-value accent">${lgW}-${lgL}-${lgT}</div>
          <div class="stat-sub">${lgGames.length} league games</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Playoff Record</div>
          <div class="stat-value" style="color:var(--purple)">${poW}-${poL}-${poT}</div>
          <div class="stat-sub">${poGames.length} playoff games</div>
        </div>
      </div>` : ''}

      <div class="card" style="text-align:center">
        <div class="card-title" style="justify-content:center">Recent Form (Last 10)</div>
        <div class="form-dots">${formDots}</div>
      </div>

      <div class="card">
        <div class="card-title">Game Log</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Opponent</th>
                <th>Score</th>
                <th>Result</th>
                <th>Location</th>
                <th>Type</th>
                <th>Arena</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderRosterForTeam(games, teamName) {
  const players = {};
  const staff = {};
  const teamGames = games.filter(g => g.homeTeam === teamName || g.visitorTeam === teamName);

  teamGames.forEach(g => {
    const side = g.homeTeam === teamName ? 'home' : 'visitor';
    const sideData = g[side];
    sideData.roster.forEach(p => {
      if (p.status !== 'active') return;
      const key = p.name;
      if (!players[key]) {
        players[key] = { name: p.name, number: p.number, position: p.position, gp: 0 };
      }
      players[key].gp++;
      if (p.number) players[key].number = p.number;
      if (p.position === 'G') players[key].position = 'G';
    });
    sideData.officials.forEach(o => {
      const key = o.name;
      if (!staff[key]) staff[key] = { name: o.name, role: o.role, gp: 0 };
      staff[key].gp++;
    });
  });

  const playerList = Object.values(players).sort((a, b) => {
    if (a.position === 'G' && b.position !== 'G') return -1;
    if (a.position !== 'G' && b.position === 'G') return 1;
    return a.number - b.number;
  });

  const staffList = Object.values(staff).sort((a, b) => {
    const order = { CO: 0, AC: 1, TR: 2, MG: 3 };
    return (order[a.role] || 9) - (order[b.role] || 9);
  });

  let tableRows = playerList.map(p => `
    <tr>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:600">${p.number || '-'}</td>
      <td>${toTitleCase(p.name)}</td>
      <td>${p.position === 'G' ? '<span style="color:var(--accent);font-weight:600">G</span>' : 'Skater'}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${p.gp}</td>
    </tr>
  `).join('');

  const roleLabels = { CO: 'Head Coach', AC: 'Asst. Coach', TR: 'Trainer', MG: 'Manager' };
  let staffRows = staffList.map(s => `
    <tr>
      <td>${roleLabels[s.role] || s.role}</td>
      <td>${toTitleCase(s.name)}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${s.gp}</td>
    </tr>
  `).join('');

  return `
    <div class="card">
      <div class="card-title">${teamName} — Player Roster (${playerList.length} players across ${teamGames.length} games)</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Player</th><th>Position</th><th>GP</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">${teamName} — Coaching Staff</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Role</th><th>Name</th><th>Games</th></tr></thead>
          <tbody>${staffRows}</tbody>
        </table>
      </div>
    </div>
  `;
}
