<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toronto Eagles — Gamesheet Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #060a14;
  --bg-elevated: #0a0f1a;
  --card: #0e1525;
  --card-hover: #121c30;
  --border: #1a2744;
  --border-light: #243352;
  --text: #dce4f5;
  --text-muted: #8b9ec2;
  --text-dim: #556b94;
  --accent: #38bdf8;
  --accent-dim: rgba(56, 189, 248, 0.15);
  --green: #34d399;
  --green-dim: rgba(52, 211, 153, 0.15);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.15);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251, 191, 36, 0.15);
  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.15);
  --grid: #152035;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

.dashboard-root { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* Hero */
.hero {
  padding: 48px 0 24px;
  text-align: center;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: -50%; right: -50%; bottom: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(56, 189, 248, 0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(56, 189, 248, 0.2);
  background: rgba(56, 189, 248, 0.06);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 16px;
}
.hero-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.hero h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #e2e8f0 0%, #38bdf8 50%, #a78bfa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  color: var(--text-muted);
  font-size: 15px;
  max-width: 600px;
  margin: 0 auto;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 12px 20px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s;
  letter-spacing: 0.3px;
}
.tab-btn:hover { color: var(--text-muted); }
.tab-btn.active {
  color: var(--accent);
}
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}
.tab-panel {
  display: none;
  animation: fadeIn 0.3s ease;
}
.tab-panel.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon {
  color: var(--accent);
  font-size: 18px;
}

/* Stat cards row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.stat-card .stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  font-family: 'IBM Plex Mono', monospace;
}
.stat-card .stat-value {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
}
.stat-card .stat-value.accent { color: var(--accent); }
.stat-card .stat-value.green { color: var(--green); }
.stat-card .stat-value.red { color: var(--red); }
.stat-card .stat-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Form dots (recent form) */
.form-dots {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.form-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
}
.form-dot.W { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.3); }
.form-dot.L { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }
.form-dot.T { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251, 191, 36, 0.3); }

/* Tables */
.table-wrap {
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
thead th {
  background: var(--bg-elevated);
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'IBM Plex Mono', monospace;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1;
}
thead th.sortable { cursor: pointer; user-select: none; }
thead th.sortable:hover { color: var(--accent); }
thead th.sorted { color: var(--accent); }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--card-hover); }
tbody tr:last-child td { border-bottom: none; }
tbody tr.clickable { cursor: pointer; }
tbody tr.eagles-row { background: rgba(56, 189, 248, 0.04); }
tbody tr.eagles-row:hover { background: rgba(56, 189, 248, 0.08); }

/* Result badges */
.result-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 22px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
}
.result-badge.W { background: var(--green-dim); color: var(--green); }
.result-badge.L { background: var(--red-dim); color: var(--red); }
.result-badge.T { background: var(--yellow-dim); color: var(--yellow); }

.game-type-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
}
.game-type-badge.LG { background: var(--accent-dim); color: var(--accent); }
.game-type-badge.PO { background: var(--purple-dim); color: var(--purple); }

/* Selects / Dropdowns */
.filter-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'IBM Plex Mono', monospace;
}
select, .search-input {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  min-width: 200px;
}
select:focus, .search-input:focus { border-color: var(--accent); }
select option { background: var(--card); color: var(--text); }

/* Gamesheet viewer */
.gamesheet {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) {
  .gamesheet { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
.gamesheet-header {
  grid-column: 1 / -1;
  text-align: center;
  padding: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.gamesheet-header .score-display {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 48px;
  font-weight: 700;
  margin: 12px 0;
}
.gamesheet-header .score-display .score-sep { color: var(--text-dim); margin: 0 16px; }
.gamesheet-header .teams-display {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  font-size: 18px;
  font-weight: 600;
}
.gamesheet-header .team-name { min-width: 200px; }
.gamesheet-header .team-name.home { text-align: right; }
.gamesheet-header .team-name.visitor { text-align: left; }
.gamesheet-header .team-name.eagles { color: var(--accent); }
.gamesheet-header .game-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 8px;
  font-family: 'IBM Plex Mono', monospace;
}
.gamesheet-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.gamesheet-section h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.scoring-full {
  grid-column: 1 / -1;
}

/* Scouting cards */
.scouting-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}
.scouting-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.scouting-card h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.scouting-card .record {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 12px;
}
.threat-list {
  list-style: none;
  padding: 0;
}
.threat-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.threat-list li:last-child { border-bottom: none; }
.threat-list .player-num {
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  margin-right: 8px;
}
.threat-list .stat-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-dim);
  color: var(--accent);
}
.threat-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'IBM Plex Mono', monospace;
  margin: 12px 0 6px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.threat-section-title:first-of-type { border-top: none; margin-top: 0; }

/* Analytics section */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 900px) {
  .analytics-grid { grid-template-columns: 1fr; }
}
.analytics-grid .card.full-width { grid-column: 1 / -1; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-label {
  font-size: 12px;
  color: var(--text-muted);
  min-width: 60px;
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}
.bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg-elevated);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  position: absolute;
  top: 0;
  left: 0;
}
.bar-fill span.bar-text {
  display: none;
}
.bar-track span.bar-text-outside {
  position: absolute;
  top: 50%;
  left: 8px;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 600;
  font-family: 'IBM Plex Mono', monospace;
  color: #fff;
  white-space: nowrap;
  z-index: 1;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.mini-stat {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.mini-val {
  font-size: 24px;
  font-weight: 700;
  font-family: 'IBM Plex Mono', monospace;
}
.mini-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}
.player-link {
  cursor: pointer;
  color: var(--text);
  transition: color 0.15s;
}
.player-link:hover {
  color: var(--accent);
  text-decoration: underline;
}
.bar-fill.accent { background: linear-gradient(90deg, var(--accent), #60a5fa); }
.bar-fill.green { background: linear-gradient(90deg, var(--green), #6ee7b7); }
.bar-fill.red { background: linear-gradient(90deg, var(--red), #fca5a5); }
.bar-fill.yellow { background: linear-gradient(90deg, var(--yellow), #fde68a); }
.bar-fill.purple { background: linear-gradient(90deg, var(--purple), #c4b5fd); }

/* H2H grid */
.h2h-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.h2h-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
.h2h-card .opponent {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}
.h2h-card .h2h-record {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}
.h2h-card .h2h-record span { margin-right: 12px; }
.h2h-card .h2h-record .w { color: var(--green); }
.h2h-card .h2h-record .l { color: var(--red); }
.h2h-card .h2h-record .t { color: var(--yellow); }
.h2h-card .h2h-goals {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  overflow-y: auto;
  padding: 40px 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: block; }
.modal-content {
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
}
.modal-close {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
  transition: background 0.2s;
}
.modal-close:hover { background: var(--card-hover); }

/* Roster mini table */
.roster-mini { font-size: 12px; }
.roster-mini .player-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid rgba(26, 39, 68, 0.5);
}
.roster-mini .player-row:last-child { border-bottom: none; }
.roster-mini .player-num {
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  width: 30px;
}
.roster-mini .player-name { flex: 1; }
.roster-mini .player-pos {
  color: var(--accent);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  width: 24px;
  text-align: right;
}

/* Scoring timeline */
.scoring-timeline { list-style: none; }
.scoring-timeline li {
  display: grid;
  grid-template-columns: 28px 48px 36px 1fr auto auto;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.scoring-timeline li:last-child { border-bottom: none; }
.scoring-timeline .period-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 6px;
  border-radius: 4px;
  text-align: center;
}
.scoring-timeline .time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
}
.scoring-timeline .run-score {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-align: center;
}
.scoring-timeline .scorer { font-weight: 600; }
.scoring-timeline .assists { color: var(--text-muted); font-size: 12px; }
.scoring-timeline .team-indicator {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  padding: 1px 6px;
  border-radius: 3px;
}
.scoring-timeline .team-indicator.home { background: rgba(167,139,250,0.15); color: var(--purple); }
.scoring-timeline .team-indicator.visitor { background: var(--accent-dim); color: var(--accent); }

/* Penalty list */
.penalty-list { list-style: none; }
.penalty-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.penalty-list li:last-child { border-bottom: none; }
.penalty-list .pen-period {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--yellow);
  background: var(--yellow-dim);
  padding: 2px 6px;
  border-radius: 4px;
}
.penalty-list .pen-code {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--red);
  font-weight: 600;
  min-width: 50px;
}
.penalty-list .pen-min {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 600px) {
  .hero h1 { font-size: 26px; }
  .stat-card .stat-value { font-size: 24px; }
  .tabs { gap: 0; }
  .tab-btn { padding: 10px 12px; font-size: 12px; }
  .scouting-grid { grid-template-columns: 1fr; }
}

/* Period breakdown bars */
.period-breakdown {
  display: flex;
  gap: 48px;
  align-items: flex-end;
  justify-content: center;
  height: 280px;
  padding-top: 30px;
}
.period-bar-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.period-bar-pair {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  height: 220px;
}
.period-bar {
  width: 56px;
  border-radius: 6px 6px 0 0;
  position: relative;
  transition: height 0.6s ease;
  min-height: 3px;
}
.period-bar.gf { background: linear-gradient(180deg, var(--accent), rgba(56, 189, 248, 0.4)); }
.period-bar.ga { background: linear-gradient(180deg, var(--red), rgba(248, 113, 113, 0.4)); }
.period-bar .bar-val {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
}
.period-bar.gf .bar-val { color: var(--accent); }
.period-bar.ga .bar-val { color: var(--red); }
.period-bar-label {
  font-size: 14px;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
}

.legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text-muted);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
}
.legend-dot.gf { background: var(--accent); }
.legend-dot.ga { background: var(--red); }

/* No data message */
.no-data {
  padding: 40px;
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
}

footer {
  text-align: center;
  padding: 40px 0;
  color: var(--text-dim);
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* Highlights */
.highlights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}
.highlight-card {
  display: flex;
  gap: 14px;
  padding: 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.highlight-icon {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
  width: 36px;
  text-align: center;
  padding-top: 2px;
}
.highlight-body { flex: 1; min-width: 0; }
.highlight-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);

}
.highlight-player {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.highlight-num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}
.highlight-value {
  font-size: 13px;
  font-weight: 600;
  color: var(--yellow);
  margin-bottom: 4px;
}

  color: var(--text-muted);
  line-height: 1.5;
}
.highlight-date {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;

}
</style>
